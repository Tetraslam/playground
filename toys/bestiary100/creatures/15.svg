<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#f4ead0"/>
  <!-- faint sand refraction lines -->
  <g stroke="#e3d4a8" stroke-width="1" fill="none" opacity="0.7">
    <path d="M0 70 Q200 60 400 80"/>
    <path d="M0 330 Q200 350 400 320"/>
    <path d="M40 0 Q60 200 30 400"/>
    <path d="M370 0 Q350 200 380 400"/>
  </g>

  <!-- caustic cast beam: from carapace toward upper-right -->
  <polygon points="232,178 318,92 330,104 244,190" fill="#7fd4d4" opacity="0.35"/>
  <line x1="238" y1="184" x2="324" y2="98" stroke="#7fd4d4" stroke-width="1.2" opacity="0.8"/>
  <circle cx="328" cy="100" r="6" fill="#c98a3a" opacity="0.55"/>

  <!-- six stilted legs (glass shards) -->
  <g stroke="#3a2a18" stroke-width="2.2" stroke-linecap="round" fill="none">
    <line x1="170" y1="170" x2="120" y2="120"/>
    <line x1="230" y1="170" x2="280" y2="120"/>
    <line x1="160" y1="200" x2="100" y2="210"/>
    <line x1="240" y1="200" x2="300" y2="210"/>
    <line x1="170" y1="232" x2="120" y2="290"/>
    <line x1="230" y1="232" x2="280" y2="290"/>
  </g>
  <g fill="#3a2a18">
    <circle cx="120" cy="120" r="2.5"/>
    <circle cx="280" cy="120" r="2.5"/>
    <circle cx="100" cy="210" r="2.5"/>
    <circle cx="300" cy="210" r="2.5"/>
    <circle cx="120" cy="290" r="2.5"/>
    <circle cx="280" cy="290" r="2.5"/>
  </g>

  <!-- carapace underframe -->
  <ellipse cx="200" cy="200" rx="58" ry="42" fill="#3a2a18"/>

  <!-- lens cluster: 7 meniscus lenses -->
  <!-- peripheral 6 -->
  <g fill="#7fd4d4" stroke="#c98a3a" stroke-width="2">
    <circle cx="200" cy="158" r="20"/>
    <circle cx="236" cy="178" r="20"/>
    <circle cx="236" cy="222" r="20"/>
    <circle cx="200" cy="242" r="20"/>
    <circle cx="164" cy="222" r="20"/>
    <circle cx="164" cy="178" r="20"/>
  </g>
  <!-- central lens -->
  <circle cx="200" cy="200" r="24" fill="#7fd4d4" stroke="#c98a3a" stroke-width="2.5"/>
  <!-- focal glints -->
  <g fill="#f4ead0">
    <circle cx="194" cy="194" r="3"/>
    <circle cx="194" cy="153" r="2"/>
    <circle cx="230" cy="173" r="2"/>
    <circle cx="230" cy="217" r="2"/>
    <circle cx="194" cy="237" r="2"/>
    <circle cx="158" cy="217" r="2"/>
    <circle cx="158" cy="173" r="2"/>
  </g>

  <!-- scale mark -->
  <g stroke="#3a2a18" stroke-width="1" fill="#3a2a18" font-family="serif" font-size="11">
    <line x1="320" y1="360" x2="370" y2="360"/>
    <line x1="320" y1="356" x2="320" y2="364"/>
    <line x1="370" y1="356" x2="370" y2="364"/>
    <text x="345" y="376" text-anchor="middle">5 cm</text>
    <text x="200" y="392" text-anchor="middle" font-style="italic">Caustic Kirn · dorsal</text>
  </g>
</svg>
