<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#1a1a24"/>
  <!-- vent fissure glow -->
  <ellipse cx="200" cy="372" rx="150" ry="14" fill="#c8642a" opacity="0.35"/>
  <ellipse cx="200" cy="370" rx="90" ry="8" fill="#e8a040" opacity="0.5"/>
  <!-- rising plume -->
  <path d="M 170 360 Q 165 250 200 150 Q 235 250 230 360" fill="none" stroke="#c8642a" stroke-width="2" opacity="0.25"/>
  <!-- ringdrift column -->
  <g stroke="#d8d0c0" fill="none">
    <!-- main column body -->
    <path d="M 175 360 L 188 90 L 212 90 L 225 360 Z" fill="#2a2a36" stroke="#9a9288" stroke-width="1.5"/>
    <!-- ring divisions -->
    <line x1="176" y1="335" x2="224" y2="335" stroke="#9a9288" stroke-width="1"/>
    <line x1="177" y1="310" x2="223" y2="310" stroke="#9a9288" stroke-width="1"/>
    <line x1="178" y1="285" x2="222" y2="285" stroke="#9a9288" stroke-width="1"/>
    <line x1="179" y1="260" x2="221" y2="260" stroke="#9a9288" stroke-width="1"/>
    <line x1="180" y1="235" x2="220" y2="235" stroke="#9a9288" stroke-width="1"/>
    <line x1="181" y1="210" x2="219" y2="210" stroke="#9a9288" stroke-width="1"/>
    <line x1="182" y1="185" x2="218" y2="185" stroke="#9a9288" stroke-width="1"/>
    <line x1="183" y1="160" x2="217" y2="160" stroke="#9a9288" stroke-width="1"/>
    <line x1="184" y1="135" x2="216" y2="135" stroke="#9a9288" stroke-width="1"/>
    <line x1="185" y1="110" x2="215" y2="110" stroke="#9a9288" stroke-width="1"/>
    <!-- hollow top opening -->
    <ellipse cx="200" cy="90" rx="12" ry="4" fill="#0c0c14" stroke="#9a9288" stroke-width="1.5"/>
  </g>
  <!-- drifting shed rings rising on plume -->
  <g fill="none" stroke="#d8a850" stroke-width="1.5" opacity="0.85">
    <ellipse cx="158" cy="230" rx="10" ry="3.5"/>
    <ellipse cx="148" cy="175" rx="8" ry="2.8"/>
    <ellipse cx="245" cy="205" rx="9" ry="3"/>
    <ellipse cx="252" cy="140" rx="6" ry="2.2"/>
  </g>
  <!-- label -->
  <text x="200" y="392" text-anchor="middle" font-family="monospace" font-size="11" fill="#9a9288">Ringdrift · the Vent</text>
</svg>
