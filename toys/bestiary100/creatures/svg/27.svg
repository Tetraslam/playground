<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#f4f1e8"/>
  <!-- field-guide rule -->
  <line x1="24" y1="36" x2="376" y2="36" stroke="#2b2a28" stroke-width="0.75"/>
  <text x="24" y="28" font-family="Georgia, serif" font-size="11" fill="#2b2a28" font-style="italic">Photocopris larcena</text>
  <text x="376" y="28" font-family="Georgia, serif" font-size="10" fill="#2b2a28" text-anchor="end">dorsal view</text>

  <!-- lobopods (six, around rim) -->
  <g stroke="#2b2a28" stroke-width="1.6" fill="none" stroke-linecap="round">
    <path d="M140 210 C 120 220, 108 236, 104 256"/>
    <path d="M150 250 C 134 268, 126 286, 124 308"/>
    <path d="M200 268 C 200 290, 200 308, 200 328"/>
    <path d="M250 250 C 266 268, 274 286, 276 308"/>
    <path d="M260 210 C 280 220, 292 236, 296 256"/>
    <path d="M200 150 C 200 132, 200 118, 200 102"/>
  </g>

  <!-- carapace: domed oval, polygonal tessellation -->
  <ellipse cx="200" cy="210" rx="92" ry="74" fill="#e8dcb8" stroke="#2b2a28" stroke-width="1.4"/>

  <!-- polygon sockets -->
  <g fill="none" stroke="#2b2a28" stroke-width="0.8">
    <polygon points="200,150 240,160 252,200 224,228 176,228 148,200 160,160"/>
    <line x1="200" y1="150" x2="200" y2="228"/>
    <line x1="148" y1="200" x2="252" y2="200"/>
    <line x1="160" y1="160" x2="224" y2="228"/>
    <line x1="240" y1="160" x2="176" y2="228"/>
    <line x1="200" y1="150" x2="148" y2="200"/>
    <line x1="200" y1="150" x2="252" y2="200"/>
    <line x1="200" y1="228" x2="160" y2="160"/>
    <line x1="200" y1="228" x2="240" y2="160"/>
  </g>

  <!-- bioluminescent grafts (lit sockets) -->
  <g fill="#6fd6c4">
    <circle cx="180" cy="175" r="5.5"/>
    <circle cx="222" cy="182" r="4.5"/>
    <circle cx="166" cy="205" r="4"/>
    <circle cx="232" cy="212" r="5"/>
    <circle cx="200" cy="195" r="6"/>
    <circle cx="190" cy="218" r="4"/>
    <circle cx="214" cy="158" r="3.5"/>
    <circle cx="158" cy="186" r="3.5"/>
  </g>
  <!-- soft haloes on a few -->
  <g fill="#6fd6c4" opacity="0.25">
    <circle cx="200" cy="195" r="11"/>
    <circle cx="180" cy="175" r="10"/>
    <circle cx="232" cy="212" r="9"/>
  </g>

  <!-- radula / head notch at front (top of figure) -->
  <path d="M188 102 L200 88 L212 102" fill="none" stroke="#2b2a28" stroke-width="1.4"/>
  <g stroke="#2b2a28" stroke-width="0.6">
    <line x1="194" y1="94" x2="194" y2="100"/>
    <line x1="200" y1="92" x2="200" y2="100"/>
    <line x1="206" y1="94" x2="206" y2="100"/>
  </g>

  <!-- scale bar -->
  <g stroke="#2b2a28" stroke-width="0.8" fill="#2b2a28" font-family="Georgia, serif" font-size="9">
    <line x1="280" y1="372" x2="340" y2="372"/>
    <line x1="280" y1="368" x2="280" y2="376"/>
    <line x1="340" y1="368" x2="340" y2="376"/>
    <text x="310" y="386" text-anchor="middle">~4 cm</text>
  </g>
</svg>
