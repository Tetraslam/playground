  <g stroke="#6b7280" stroke-width="1" fill="none" opacity="0.7">
    <path d="M 178 354 Q 168 362 158 370"/>
    <path d="M 184 354 Q 178 364 172 372"/>
    <path d="M 216 354 Q 222 364 228 372"/>
    <path d="M 222 354 Q 232 362 242 370"/>
