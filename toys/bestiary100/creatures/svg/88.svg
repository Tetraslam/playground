    <rect x="180" y="270" width="40" height="14" fill="#6b7280"/>
    <rect x="182" y="256" width="36" height="14" fill="#b87333"/>
    <rect x="182" y="242" width="36" height="14" fill="#6b7280"/>
    <rect x="184" y="228" width="32" height="13" fill="#b87333"/>
    <rect x="184" y="215" width="32" height="13" fill="#6b7280"/>
    <rect x="186" y="202" width="28" height="13" fill="#b87333"/>
    <rect x="186" y="189" width="28" height="13" fill="#6b7280"/>
    <rect x="188" y="176" width="24" height="13" fill="#b87333"/>
