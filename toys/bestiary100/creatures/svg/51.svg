<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>Thermogradus fissuralis — field sketch</title>
  <!-- palette: ink #1a1a1a, paper #f4efe2, hot #c2410c, cold #1e6091 -->
  <rect width="400" height="400" fill="#f4efe2"/>

  <!-- fissure / substrate suggestion -->
  <path d="M0 360 L120 340 L200 352 L300 332 L400 348 L400 400 L0 400 Z" fill="#1a1a1a" opacity="0.08"/>
  <path d="M0 348 L120 328 L200 340 L300 320 L400 336" fill="none" stroke="#1a1a1a" stroke-width="1.2" opacity="0.5"/>

  <!-- hot anchor (buried in vent brine, lower-left) -->
  <g>
    <ellipse cx="90" cy="335" rx="34" ry="16" fill="#c2410c" opacity="0.35"/>
    <ellipse cx="90" cy="332" rx="20" ry="9" fill="#c2410c"/>
    <path d="M70 330 Q90 318 110 330" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
    <!-- vent shimmer -->
    <path d="M78 320 Q84 300 76 286 M96 322 Q102 302 94 288" fill="none" stroke="#c2410c" stroke-width="1" opacity="0.55"/>
  </g>

  <!-- the ribbon: a long laminate spanning the gradient, drawn as layered strokes -->
  <g stroke-linecap="round">
    <path d="M104 328 C160 280 240 200 312 96" fill="none" stroke="#1a1a1a" stroke-width="0.7" opacity="0.4"/>
    <path d="M107 322 C163 274 243 194 315 90" fill="none" stroke="#1a1a1a" stroke-width="0.7" opacity="0.4"/>
    <!-- alternating laminae -->
    <g stroke-width="1.4">
      <path d="M105 325 C161 277 241 197 313 93" fill="none" stroke="#c2410c"/>
      <path d="M106 324 C162 276 242 196 314 92" fill="none" stroke="#1e6091"/>
      <path d="M106 326 C162 278 242 198 314 94" fill="none" stroke="#1a1a1a"/>
    </g>
    <!-- busbar nerve -->
    <path d="M105 325 C161 277 241 197 313 93" fill="none" stroke="#1a1a1a" stroke-width="0.4" stroke-dasharray="2 2"/>
  </g>

  <!-- cold end: frayed filament brush in cold ambient (upper-right) -->
  <g stroke="#1e6091" stroke-width="1" fill="none" stroke-linecap="round">
    <path d="M313 93 L336 64"/>
    <path d="M313 93 L348 70"/>
    <path d="M313 93 L330 52"/>
    <path d="M313 93 L356 58"/>
    <path d="M313 93 L342 48"/>
    <path d="M313 93 L362 72"/>
  </g>
  <circle cx="313" cy="93" r="3" fill="#1e6091"/>

  <!-- ventral rasping sole at hot end -->
  <path d="M104 328 Q112 340 96 344 Q84 346 82 336" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
  <g stroke="#1a1a1a" stroke-width="0.6">
    <line x1="90" y1="338" x2="88" y2="344"/>
    <line x1="95" y1="339" x2="94" y2="345"/>
    <line x1="100" y1="339" x2="100" y2="345"/>
  </g>

  <!-- labels (field-guide style) -->
  <g font-family="Georgia, 'Times New Roman', serif" fill="#1a1a1a" font-size="11">
    <text x="14" y="36" font-style="italic" font-size="14">Thermogradus fissuralis</text>
    <text x="14" y="50" font-size="9" opacity="0.7">the Vent · gradient-bound thermoelectric ribbon</text>
    <line x1="14" y1="58" x2="180" y2="58" stroke="#1a1a1a" stroke-width="0.5"/>

    <text x="48" y="316" fill="#c2410c" font-size="9">hot anchor (340°C)</text>
    <text x="240" y="84" fill="#1e6091" font-size="9">cold filaments (4°C)</text>
    <text x="200" y="216" font-size="9" opacity="0.7" transform="rotate(-58 200 216)">FeS / protein laminate</text>
    <text x="84" y="372" font-size="8" opacity="0.7">ventral sole</text>
  </g>

  <!-- scale bar -->
  <g stroke="#1a1a1a" stroke-width="0.8">
    <line x1="300" y1="380" x2="360" y2="380"/>
    <line x1="300" y1="376" x2="300" y2="384"/>
    <line x1="360" y1="376" x2="360" y2="384"/>
  </g>
  <text x="330" y="394" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#1a1a1a">1 m</text>
</svg>
