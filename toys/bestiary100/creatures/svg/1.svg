<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f4efe6"/>
  <!-- fissure wall suggestion -->
  <path d="M0 340 Q100 320 200 345 T400 338" stroke="#8a7e6a" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M0 360 Q120 345 220 362 T400 358" stroke="#8a7e6a" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- logarithmic spiral of lamellae -->
  <g transform="translate(200,195)">
    <!-- outer (oldest) lamellae -->
    <path d="M -10 -130 Q 95 -120 120 -10 Q 130 90 30 120 Q -90 130 -120 20 Q -125 -80 -40 -120 Z"
          fill="#cdd6dc" stroke="#2b2f33" stroke-width="1.4" opacity="0.85"/>
    <path d="M -5 -110 Q 82 -100 104 -8 Q 112 78 26 104 Q -76 112 -102 18 Q -106 -66 -34 -100 Z"
          fill="#b7c4ce" stroke="#2b2f33" stroke-width="1.3" opacity="0.9"/>
    <path d="M 0 -90 Q 70 -82 88 -6 Q 95 66 22 88 Q -64 94 -84 14 Q -88 -54 -28 -84 Z"
          fill="#a3b3c0" stroke="#2b2f33" stroke-width="1.2"/>
    <path d="M 4 -72 Q 58 -66 72 -4 Q 78 54 18 72 Q -52 76 -68 12 Q -70 -42 -22 -68 Z"
          fill="#8fa1b1" stroke="#2b2f33" stroke-width="1.1"/>
    <path d="M 6 -56 Q 46 -52 58 -2 Q 62 42 14 58 Q -42 60 -54 10 Q -56 -32 -18 -54 Z"
          fill="#7c91a3" stroke="#2b2f33" stroke-width="1.0"/>
    <path d="M 6 -42 Q 36 -38 44 -2 Q 48 32 10 44 Q -32 46 -40 8 Q -42 -22 -14 -40 Z"
          fill="#6a8094" stroke="#2b2f33" stroke-width="0.9"/>
    <path d="M 5 -30 Q 26 -27 32 -1 Q 34 24 8 32 Q -22 34 -28 6 Q -30 -16 -10 -28 Z"
          fill="#5a7186" stroke="#2b2f33" stroke-width="0.85"/>
    <!-- iridescent accent: inner lumen -->
    <circle r="8" fill="#9b6fb0" stroke="#2b2f33" stroke-width="0.8"/>
    <circle r="3" fill="#e8d7f0"/>

    <!-- calcified trail -->
    <path d="M -120 20 Q -160 30 -200 60 Q -240 95 -270 140"
          stroke="#c9b896" stroke-width="2" fill="none" stroke-dasharray="2 4" opacity="0.7"/>
  </g>

  <!-- scale bar -->
  <line x1="40" y1="380" x2="100" y2="380" stroke="#2b2f33" stroke-width="1.2"/>
  <text x="70" y="374" font-family="serif" font-size="10" fill="#2b2f33" text-anchor="middle">~1 m</text>

  <!-- caption -->
  <text x="200" y="30" font-family="serif" font-size="13" fill="#2b2f33" text-anchor="middle" font-style="italic">Bismuth Flue</text>
  <text x="200" y="45" font-family="serif" font-size="9" fill="#5a5145" text-anchor="middle">dorsal aspect · the Vent</text>
</svg>
