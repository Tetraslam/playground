<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0e1a24"/>
  <!-- bell body -->
  <g stroke="#a8d8f0" fill="none" stroke-width="1.5">
    <path d="M 140 120 L 140 250 Q 200 300 260 250 L 260 120 Z"/>
    <!-- hex facets -->
    <line x1="200" y1="120" x2="200" y2="290"/>
    <line x1="140" y1="180" x2="260" y2="180"/>
    <line x1="140" y1="120" x2="260" y2="120"/>
  </g>
  <!-- suspension thread -->
  <line x1="200" y1="40" x2="200" y2="120" stroke="#5a7a8c" stroke-width="0.8" stroke-dasharray="3 3"/>
  <!-- tuned tines at lip -->
  <g stroke="#d8eef8" stroke-width="1.2">
    <line x1="150" y1="278" x2="146" y2="310"/>
    <line x1="166" y1="288" x2="163" y2="328"/>
    <line x1="183" y1="294" x2="181" y2="340"/>
    <line x1="200" y1="296" x2="200" y2="346"/>
    <line x1="217" y1="294" x2="219" y2="340"/>
    <line x1="234" y1="288" x2="237" y2="328"/>
    <line x1="250" y1="278" x2="254" y2="310"/>
  </g>
  <!-- sound arcs -->
  <g stroke="#7fb8d8" fill="none" stroke-width="0.8" opacity="0.7">
    <path d="M 120 300 Q 90 320 110 350"/>
    <path d="M 280 300 Q 310 320 290 350"/>
  </g>
  <!-- cyst / caption -->
  <circle cx="330" cy="60" r="3" fill="#e8f4fc"/>
  <text x="200" y="385" font-family="monospace" font-size="11" fill="#8aa6b8" text-anchor="middle">Nivean Bell · Rime</text>
</svg>
