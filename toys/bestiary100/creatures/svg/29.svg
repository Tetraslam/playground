<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#eef2f4"/>
  <!-- scale bar -->
  <line x1="30" y1="370" x2="130" y2="370" stroke="#2b2b2b" stroke-width="1"/>
  <text x="30" y="385" font-family="serif" font-size="11" fill="#2b2b2b">~1 km (chain)</text>
  <!-- the chain: a diagonal ribbon of zooids -->
  <g stroke="#2b2b2b" fill="none">
    <path d="M 60 60 Q 200 200 340 340" stroke-width="0.6" stroke-dasharray="2 3"/>
  </g>
  <g>
    <!-- zooid filaments along the chain -->
    <g fill="#d9c27a" stroke="#2b2b2b" stroke-width="0.8">
      <ellipse cx="80" cy="78" rx="6" ry="3" transform="rotate(45 80 78)"/>
      <ellipse cx="110" cy="108" rx="6" ry="3" transform="rotate(45 110 108)"/>
      <ellipse cx="140" cy="138" rx="6" ry="3" transform="rotate(45 140 138)"/>
      <ellipse cx="170" cy="168" rx="6" ry="3" transform="rotate(45 170 168)"/>
      <ellipse cx="200" cy="198" rx="6" ry="3" transform="rotate(45 200 198)"/>
      <ellipse cx="230" cy="228" rx="6" ry="3" transform="rotate(45 230 228)"/>
      <ellipse cx="260" cy="258" rx="6" ry="3" transform="rotate(45 260 258)"/>
      <ellipse cx="290" cy="288" rx="6" ry="3" transform="rotate(45 290 288)"/>
      <ellipse cx="320" cy="318" rx="6" ry="3" transform="rotate(45 320 318)"/>
    </g>
    <!-- filament threads hanging off each zooid -->
    <g stroke="#2b2b2b" stroke-width="0.5">
      <line x1="82" y1="80" x2="100" y2="120"/>
      <line x1="112" y1="110" x2="130" y2="150"/>
      <line x1="142" y1="140" x2="160" y2="180"/>
      <line x1="172" y1="170" x2="190" y2="210"/>
      <line x1="202" y1="200" x2="220" y2="240"/>
      <line x1="232" y1="230" x2="250" y2="270"/>
      <line x1="262" y1="260" x2="280" y2="300"/>
      <line x1="292" y1="290" x2="310" y2="330"/>
    </g>
  </g>
  <!-- a single detached zooid drifting away -->
  <g>
    <ellipse cx="60" cy="300" rx="5" ry="2.5" fill="#d9c27a" stroke="#2b2b2b" stroke-width="0.7" transform="rotate(-20 60 300)"/>
    <line x1="61" y1="302" x2="75" y2="335" stroke="#2b2b2b" stroke-width="0.5"/>
  </g>
  <text x="78" y="345" font-family="serif" font-style="italic" font-size="10" fill="#2b2b2b">stray zooid (post-fission)</text>
  <!-- label -->
  <text x="200" y="30" text-anchor="middle" font-family="serif" font-style="italic" font-size="14" fill="#2b2b2b">Aerochorda dissoluta</text>
  <text x="200" y="46" text-anchor="middle" font-family="serif" font-size="10" fill="#555">linked fleet — Aether</text>
</svg>
