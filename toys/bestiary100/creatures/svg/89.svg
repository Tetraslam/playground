<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0a1628"/>
  <!-- rime-cloud haze -->
  <rect x="0" y="20" width="400" height="120" fill="#1a2f4a" opacity="0.6"/>
  <!-- hexagonal lattice canopy -->
  <g stroke="#6fb3d4" stroke-width="1.5" fill="none" opacity="0.85">
    <!-- row 1 -->
    <polygon points="80,150 110,135 140,150 140,180 110,195 80,180"/>
    <polygon points="140,150 170,135 200,150 200,180 170,195 140,180"/>
    <polygon points="200,150 230,135 260,150 260,180 230,195 200,180"/>
    <polygon points="260,150 290,135 320,150 320,180 290,195 260,180"/>
    <!-- row 2 (offset) -->
    <polygon points="50,195 80,180 110,195 110,225 80,240 50,225"/>
    <polygon points="110,195 140,180 170,195 170,225 140,240 110,225"/>
    <polygon points="170,195 200,180 230,195 230,225 200,240 170,225"/>
    <polygon points="230,195 260,180 290,195 290,225 260,240 230,225"/>
    <polygon points="290,195 320,180 350,195 350,225 320,240 290,225"/>
    <!-- row 3 -->
    <polygon points="80,240 110,225 140,240 140,270 110,285 80,270"/>
    <polygon points="140,240 170,225 200,240 200,270 170,285 140,270"/>
    <polygon points="200,240 230,225 260,240 260,270 230,285 200,270"/>
    <polygon points="260,240 290,225 320,240 320,270 290,285 260,270"/>
    <!-- row 4 -->
    <polygon points="50,285 80,270 110,285 110,315 80,330 50,315"/>
    <polygon points="110,285 140,270 170,285 170,315 140,330 110,315"/>
    <polygon points="170,285 200,270 230,285 230,315 200,330 170,315"/>
    <polygon points="230,285 260,270 290,285 290,315 260,330 230,315"/>
    <polygon points="290,285 320,270 350,285 350,315 320,330 290,315"/>
  </g>
  <!-- the firing cell: prey caught -->
  <polygon points="170,195 200,180 230,195 230,225 200,240 170,225" fill="#e8f4ff" opacity="0.9" stroke="#e8f4ff" stroke-width="2"/>
  <!-- nucleation threads descending to prey -->
  <g stroke="#e8f4ff" stroke-width="0.8" opacity="0.7">
    <line x1="178" y1="222" x2="195" y2="345"/>
    <line x1="190" y1="225" x2="200" y2="345"/>
    <line x1="200" y1="225" x2="205" y2="345"/>
    <line x1="210" y1="225" x2="215" y2="345"/>
    <line x1="222" y1="222" x2="225" y2="345"/>
  </g>
  <!-- ensnared prey silhouette -->
  <g fill="#d94f4f" opacity="0.85">
    <ellipse cx="200" cy="345" rx="14" ry="9"/>
    <path d="M200 354 L195 366 L205 366 Z"/>
    <circle cx="200" cy="345" r="3" fill="#0a1628"/>
  </g>
  <!-- scale + label -->
  <line x1="40" y1="378" x2="90" y2="378" stroke="#6fb3d4" stroke-width="1"/>
  <text x="98" y="382" fill="#6fb3d4" font-family="serif" font-size="11" font-style="italic">Cryostega rimalis — colony fragment, ~30 m</text>
</svg>
