<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>Galvanothrix niger — field sketch</title>
  <!-- palette: ink #1a1a1a, brine/hot #b54817, cold #2b5f8a, paper #f4ede0 -->
  <rect x="0" y="0" width="400" height="400" fill="#f4ede0"/>

  <!-- thermal gradient bar (left margin, field-guide convention) -->
  <rect x="28" y="48" width="10" height="304" fill="#b54817"/>
  <rect x="28" y="48" width="10" height="152" fill="#b54817" opacity="0.55"/>
  <rect x="28" y="200" width="10" height="152" fill="#2b5f8a" opacity="0.55"/>
  <rect x="28" y="200" width="10" height="152" fill="#2b5f8a"/>
  <text x="46" y="60" font-family="serif" font-size="11" fill="#1a1a1a">320°</text>
  <text x="46" y="360" font-family="serif" font-size="11" fill="#1a1a1a">4°</text>

  <!-- fissure wall hint -->
  <path d="M70 380 Q120 300 90 220 Q60 140 110 60" stroke="#1a1a1a" stroke-width="1" fill="none" opacity="0.35"/>
  <path d="M300 380 Q260 300 290 220 Q320 140 270 60" stroke="#1a1a1a" stroke-width="1" fill="none" opacity="0.35"/>

  <!-- hot foot plaque at smoker orifice (bottom) -->
  <g>
    <ellipse cx="180" cy="350" rx="46" ry="12" fill="#b54817" opacity="0.85"/>
    <ellipse cx="180" cy="350" rx="22" ry="6" fill="#1a1a1a"/>
    <!-- rising brine -->
    <path d="M180 344 q -6 -30 0 -60 q 6 -30 0 -60" stroke="#b54817" stroke-width="1.4" fill="none" opacity="0.7"/>
    <path d="M172 344 q -4 -28 2 -56 q 6 -28 -2 -56" stroke="#b54817" stroke-width="1" fill="none" opacity="0.5"/>
  </g>

  <!-- the lattice: branching conductive filament, hot (orange-brown) to cold (blue) -->
  <g fill="none" stroke-linecap="round">
    <!-- main trunk -->
    <path d="M180 340 C 178 300 184 270 180 240 C 176 210 184 180 180 150"
          stroke="#1a1a1a" stroke-width="2.4"/>
    <!-- branch 1 -->
    <path d="M180 240 C 160 220 150 200 138 188 C 128 178 124 168 120 150"
          stroke="#1a1a1a" stroke-width="1.8"/>
    <!-- branch 2 -->
    <path d="M180 200 C 210 185 230 175 248 162 C 262 152 270 142 276 130"
          stroke="#1a1a1a" stroke-width="1.8"/>
    <!-- branch 3 off branch1 -->
    <path d="M138 188 C 120 178 108 172 96 168" stroke="#1a1a1a" stroke-width="1.3"/>
    <!-- branch 4 off trunk -->
    <path d="M180 150 C 168 130 162 110 158 92" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>

  <!-- hot tint over lower lattice -->
  <g fill="none" stroke-linecap="round" opacity="0.75">
    <path d="M180 340 C 178 300 184 270 180 240" stroke="#b54817" stroke-width="3.4"/>
    <path d="M180 240 C 160 220 150 200 138 188" stroke="#b54817" stroke-width="2.6"/>
  </g>
  <!-- cold tint over upper lattice + apex halo -->
  <g fill="none" stroke-linecap="round" opacity="0.8">
    <path d="M180 150 C 168 130 162 110 158 92" stroke="#2b5f8a" stroke-width="2.6"/>
    <path d="M180 200 C 210 185 230 175 248 162 C 262 152 270 142 276 130" stroke="#2b5f8a" stroke-width="2.4"/>
    <path d="M120 150 C 116 138 114 128 112 118" stroke="#2b5f8a" stroke-width="1.8"/>
  </g>

  <!-- electrosensory halo at cold apices (charged filaments) -->
  <g stroke="#2b5f8a" stroke-width="0.8" fill="none" opacity="0.85">
    <path d="M158 92 l -8 -12 M158 92 l 0 -14 M158 92 l 8 -11"/>
    <path d="M276 130 l 9 -9 M276 130 l 12 -3 M276 130 l 10 5"/>
    <path d="M112 118 l -7 -8 M112 118 l 0 -10 M112 118 l 7 -7"/>
    <path d="M96 168 l -10 -4 M96 168 l -10 4"/>
  </g>

  <!-- electroplated prey caught on mid-lattice (a small chitinous form, coated) -->
  <g>
    <ellipse cx="210" cy="232" rx="7" ry="3.2" fill="#1a1a1a"/>
    <path d="M217 232 q 6 -2 9 0" stroke="#1a1a1a" stroke-width="1" fill="none"/>
    <!-- metal sheen arcs -->
    <path d="M205 229 q 5 -3 10 0" stroke="#2b5f8a" stroke-width="0.7" fill="none" opacity="0.8"/>
    <path d="M206 235 q 4 2 8 0" stroke="#b54817" stroke-width="0.7" fill="none" opacity="0.7"/>
  </g>

  <!-- current direction arrows along trunk -->
  <g fill="#1a1a1a" opacity="0.6">
    <path d="M186 295 l 0 -5 l -2 0 l 4 -4 l 4 4 l -2 0 l 0 5 z"/>
    <path d="M186 215 l 0 -5 l -2 0 l 4 -4 l 4 4 l -2 0 l 0 5 z"/>
  </g>

  <!-- caption -->
  <text x="70" y="392" font-family="serif" font-style="italic" font-size="12" fill="#1a1a1a">Galvanothrix niger</text>
  <text x="70" y="406" font-family="serif" font-size="9" fill="#1a1a1a" opacity="0.7">thermoelectric lattice · h. 1–3 m · smoker wall</text>
  <text x="285" y="406" font-family="serif" font-size="9" fill="#1a1a1a" opacity="0.7">⊕ current → ↑</text>
</svg>
