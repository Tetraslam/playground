<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#eef3f6"/>
  <!-- thin upper sky band -->
  <rect x="0" y="0" width="400" height="400" fill="#dde8ee"/>
  <!-- distant rime haze -->
  <rect x="0" y="280" width="400" height="120" fill="#cdd9e2"/>
  <line x1="0" y1="280" x2="400" y2="280" stroke="#9fb3c2" stroke-width="1"/>
  <!-- trailing rime-needle curtain -->
  <g stroke="#5f7a8c" stroke-width="1">
    <line x1="150" y1="200" x2="120" y2="290"/>
    <line x1="170" y1="205" x2="145" y2="300"/>
    <line x1="200" y1="207" x2="200" y2="305"/>
    <line x1="230" y1="205" x2="255" y2="300"/>
    <line x1="250" y1="200" x2="280" y2="290"/>
    <line x1="185" y1="206" x2="172" y2="298"/>
    <line x1="215" y1="206" x2="228" y2="298"/>
  </g>
  <!-- melt-vein axis -->
  <line x1="110" y1="195" x2="290" y2="195" stroke="#7a93a3" stroke-width="0.8" stroke-dasharray="4 3"/>
  <!-- diamond ice pane -->
  <polygon points="200,90 305,195 200,300 95,195"
           fill="#bcd2dd" stroke="#4a6373" stroke-width="2"/>
  <!-- inner facet sheen -->
  <polygon points="200,120 278,195 200,270 122,195"
           fill="none" stroke="#9fb9c6" stroke-width="1"/>
  <polygon points="200,150 250,195 200,240 150,195"
           fill="#d7e4ec" stroke="none"/>
  <!-- leading edge highlight (melt line) -->
  <path d="M 95 195 Q 200 88 305 195" fill="none" stroke="#eaf2f6" stroke-width="2"/>
  <!-- label -->
  <text x="200" y="375" text-anchor="middle" font-family="serif" font-size="13" fill="#33424d" font-style="italic">Strathvane</text>
</svg>
