<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#0e1a24"/>
  <!-- wind-shear guideline -->
  <line x1="20" y1="80" x2="380" y2="80" stroke="#2a3a4a" stroke-width="0.5" stroke-dasharray="3 4"/>

  <!-- chain of domes: leading high, trailing low along shear -->
  <g fill="none" stroke="#c9b97a" stroke-width="1.2">
    <!-- notochord -->
    <path d="M 80 120 Q 150 150 220 185 Q 290 215 360 240" stroke="#7a8a6a" stroke-width="1"/>
    <!-- dome 1 (leading, high) -->
    <ellipse cx="80" cy="120" rx="26" ry="10"/>
    <path d="M 54 120 Q 80 95 106 120" fill="#0e1a24"/>
    <ellipse cx="80" cy="120" rx="22" ry="6" fill="none" stroke="#5a6a5a" stroke-width="0.6"/>
    <!-- dome 2 -->
    <ellipse cx="150" cy="151" rx="26" ry="10"/>
    <path d="M 124 151 Q 150 126 176 151" fill="#0e1a24"/>
    <ellipse cx="150" cy="151" rx="22" ry="6" fill="none" stroke="#5a6a5a" stroke-width="0.6"/>
    <!-- dome 3 -->
    <ellipse cx="220" cy="186" rx="26" ry="10"/>
    <path d="M 194 186 Q 220 161 246 186" fill="#0e1a24"/>
    <ellipse cx="220" cy="186" rx="22" ry="6" fill="none" stroke="#5a6a5a" stroke-width="0.6"/>
    <!-- dome 4 -->
    <ellipse cx="290" cy="216" rx="26" ry="10"/>
    <path d="M 264 216 Q 290 191 316 216" fill="#0e1a24"/>
    <ellipse cx="290" cy="216" rx="22" ry="6" fill="none" stroke="#5a6a5a" stroke-width="0.6"/>
    <!-- dome 5 (trailing, low) -->
    <ellipse cx="360" cy="242" rx="26" ry="10"/>
    <path d="M 334 242 Q 360 217 386 242" fill="#0e1a24"/>
    <ellipse cx="360" cy="242" rx="22" ry="6" fill="none" stroke="#5a6a5a" stroke-width="0.6"/>
  </g>

  <!-- trailing mucus drift-net -->
  <g stroke="#3a5a6a" stroke-width="0.5" fill="none" opacity="0.85">
    <path d="M 360 248 Q 330 300 300 360"/>
    <path d="M 355 248 Q 340 310 320 370"/>
    <path d="M 365 248 Q 360 320 350 380"/>
    <path d="M 348 246 Q 320 290 290 350"/>
    <path d="M 352 250 Q 330 320 315 385"/>
  </g>
  <!-- net motes (caught aeroplankton) -->
  <g fill="#8aa0b0">
    <circle cx="318" cy="345" r="1.4"/>
    <circle cx="338" cy="330" r="1.1"/>
    <circle cx="330" cy="365" r="1.2"/>
    <circle cx="343" cy="360" r="0.9"/>
    <circle cx="305" cy="355" r="1"/>
  </g>

  <!-- hydride rim glints -->
  <g fill="#e8d488">
    <circle cx="106" cy="120" r="0.9"/>
    <circle cx="176" cy="151" r="0.9"/>
    <circle cx="246" cy="186" r="0.9"/>
    <circle cx="316" cy="216" r="0.9"/>
    <circle cx="386" cy="242" r="0.9"/>
  </g>

  <!-- caption -->
  <text x="200" y="392" text-anchor="middle" fill="#7a8a7a"
        font-family="monospace" font-size="9" font-style="italic">
    Aerotholos catenatus — vacuum-chain, Aether
  </text>
</svg>
