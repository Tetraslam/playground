<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#1a2230"/>
  <!-- fissure glow -->
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a2230"/>
      <stop offset="0.5" stop-color="#d96a2a"/>
      <stop offset="1" stop-color="#1a2230"/>
    </linearGradient>
  </defs>
  <rect x="170" y="0" width="60" height="400" fill="url(#glow)" opacity="0.55"/>
  <rect x="192" y="0" width="16" height="400" fill="#e88a3a"/>
  <!-- basalt lips -->
  <rect x="0" y="0" width="170" height="400" fill="#2a3340" opacity="0.5"/>
  <rect x="230" y="0" width="170" height="400" fill="#2a3340" opacity="0.5"/>
  <!-- pods straddling the fissure -->
  <g stroke="#3a2a18" stroke-width="1.5">
    <rect x="150" y="70"  width="100" height="18" rx="9" fill="#8a7a3a"/>
    <rect x="150" y="150" width="100" height="18" rx="9" fill="#8a7a3a"/>
    <rect x="150" y="230" width="100" height="18" rx="9" fill="#8a7a3a"/>
    <rect x="150" y="310" width="100" height="18" rx="9" fill="#8a7a3a"/>
  </g>
  <!-- hot stilts dropping into plume -->
  <g stroke="#5a4a28" stroke-width="2">
    <line x1="210" y1="88"  x2="210" y2="110"/>
    <line x1="210" y1="168" x2="210" y2="190"/>
    <line x1="210" y1="248" x2="210" y2="270"/>
    <line x1="210" y1="328" x2="210" y2="350"/>
  </g>
  <!-- cold stilts to lip -->
  <g stroke="#5a4a28" stroke-width="2">
    <line x1="160" y1="88"  x2="150" y2="88"/>
    <line x1="160" y1="168" x2="150" y2="168"/>
    <line x1="160" y1="248" x2="150" y2="248"/>
    <line x1="160" y1="328" x2="150" y2="328"/>
  </g>
  <!-- filament hint across pods -->
  <line x1="200" y1="88" x2="200" y2="328" stroke="#c9a44a" stroke-width="0.8" stroke-dasharray="2 4" opacity="0.6"/>
  <!-- rising ash -->
  <g fill="#4a6a7a" opacity="0.5">
    <circle cx="120" cy="60" r="2"/>
    <circle cx="280" cy="40" r="2"/>
    <circle cx="130" cy="20" r="1.5"/>
    <circle cx="270" cy="120" r="1.5"/>
  </g>
  <text x="200" y="388" text-anchor="middle" font-family="serif" font-size="13" fill="#c9a44a" font-style="italic">Catenother</text>
</svg>
