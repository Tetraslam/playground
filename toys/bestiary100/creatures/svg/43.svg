<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" text-rendering="geometricPrecision" font-family="Georgia, 'Times New Roman', serif">
  <!-- parchment -->
  <rect width="400" height="400" fill="#ebe3cf"/>

  <!-- vignette of mire substrate (suggesting burial) -->
  <ellipse cx="200" cy="232" rx="170" ry="44" fill="#c9bfa1" opacity="0.55"/>

  <!-- outer hoop -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <circle cx="200" cy="200" r="134" fill="none" stroke="#1a1a1a" stroke-width="0.6" opacity="0.5"/>

  <!-- inner ring where spokes anchor -->
  <circle cx="200" cy="200" r="86" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>

  <!-- spokes (40-ish, but draw 20 visible for clarity) -->
  <g stroke="#1a1a1a" stroke-width="1.1">
    <!-- generated spokes -->
    <line x1="200" y1="114" x2="200" y2="170"/>
    <line x1="226.7" y1="118.1" x2="213.0" y2="171.5"/>
    <line x1="251.8" y1="130.0" x2="225.0" y2="174.8"/>
    <line x1="273.4" y1="149.1" x2="234.5" y2="181.0"/>
    <line x1="289.5" y1="174.0" x2="241.3" y2="189.5"/>
    <line x1="298.9" y1="202.7" x2="244.9" y2="199.5"/>
    <line x1="300.9" y1="232.3" x2="245.2" y2="209.6"/>
    <line x1="295.4" y1="261.4" x2="241.6" y2="219.1"/>
    <line x1="282.7" y1="288.2" x2="234.8" y2="227.5"/>
    <line x1="263.6" y1="310.4" x2="225.1" y2="234.6"/>
    <line x1="239.3" y1="326.5" x2="213.1" y2="240.2"/>
    <line x1="211.6" y1="335.4" x2="200.0" y2="244.0"/>
    <line x1="182.5" y1="336.6" x2="186.9" y2="243.5"/>
    <line x1="154.6" y1="330.1" x2="174.2" y2="241.7"/>
    <line x1="129.1" y1="316.4" x2="162.4" y2="238.3"/>
    <line x1="107.8" y1="296.3" x2="151.8" y2="233.4"/>
    <line x1="92.0" y1="271.3" x2="143.0" y2="226.9"/>
    <line x1="82.7" y1="243.0" x2="136.1" y2="219.3"/>
    <line x1="80.5" y1="213.2" x2="131.4" y2="210.8"/>
    <line x1="84.8" y1="183.3" x2="128.8" y2="201.8"/>
    <line x1="95.5" y1="155.0" x2="128.0" y2="192.7"/>
    <line x1="112.1" y1="129.8" x2="129.7" y2="183.1"/>
    <line x1="133.7" y1="109.0" x2="133.7" y2="173.3"/>
    <line x1="159.3" y1="93.6" x2="140.4" y2="164.3"/>
    <line x1="187.7" y1="84.5" x2="148.7" y2="155.8"/>
  </g>

  <!-- hub bladder -->
  <circle cx="200" cy="200" r="30" fill="#6b2737" stroke="#1a1a1a" stroke-width="1.6"/>
  <circle cx="200" cy="200" r="22" fill="none" stroke="#1a1a1a" stroke-width="0.5" opacity="0.6"/>

  <!-- cavitation cone (fired pulse, dashed) -->
  <path d="M 200 230 L 168 330 L 232 330 Z" fill="#6b2737" opacity="0.18" stroke="#6b2737" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- annotation: vibration sense arcs (dashed) -->
  <path d="M 200 200 m -118 0 a 118 118 0 0 1 236 0" fill="none" stroke="#6b2737" stroke-width="0.7" stroke-dasharray="2 4" opacity="0.6"/>

  <!-- labels -->
  <g fill="#1a1a1a" font-size="11" font-style="italic">
    <text x="200" y="200" text-anchor="middle" dominant-baseline="middle" fill="#ebe3cf" font-size="9">hub</text>
    <line x1="230" y1="200" x2="318" y2="200" stroke="#1a1a1a" stroke-width="0.5"/>
    <text x="322" y="200" dominant-baseline="middle">resonant bladder</text>

    <line x1="262" y1="115" x2="330" y2="78" stroke="#1a1a1a" stroke-width="0.5"/>
    <text x="334" y="76" dominant-baseline="middle">tensegrity hoop</text>

    <line x1="200" y1="300" x2="200" y2="356" stroke="#1a1a1a" stroke-width="0.5"/>
    <text x="200" y="368" text-anchor="middle">cavitation pulse</text>
  </g>

  <!-- title -->
  <g fill="#1a1a1a" font-style="italic">
    <text x="20" y="32" font-size="15">Tympanax anoxica</text>
    <text x="20" y="48" font-size="10" font-style="normal" opacity="0.7">dorsal view, half-buried in mire substrate</text>
  </g>

  <!-- scale bar -->
  <g stroke="#1a1a1a" fill="#1a1a1a">
    <line x1="300" y1="380" x2="370" y2="380" stroke-width="1.4"/>
    <line x1="300" y1="376" x2="300" y2="384" stroke-width="1"/>
    <line x1="370" y1="376" x2="370" y2="384" stroke-width="1"/>
    <text x="335" y="394" font-size="9" text-anchor="middle" stroke="none">~50 cm</text>
  </g>
</svg>
