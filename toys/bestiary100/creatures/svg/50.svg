<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f4efe6"/>

  <!-- waterline -->
  <path d="M0 250 Q100 244 200 251 T400 248" stroke="#6a7a6a" stroke-width="1.2" fill="none" opacity="0.55"/>
  <path d="M0 262 Q120 256 220 263 T400 260" stroke="#6a7a6a" stroke-width="0.8" fill="none" opacity="0.35"/>

  <!-- sediment hatching below waterline -->
  <g stroke="#5a4a45" stroke-width="0.6" opacity="0.35">
    <line x1="40" y1="290" x2="70" y2="296"/>
    <line x1="120" y1="300" x2="150" y2="306"/>
    <line x1="260" y1="295" x2="290" y2="302"/>
    <line x1="330" y1="305" x2="360" y2="311"/>
  </g>

  <!-- siphon-root plunging into sediment -->
  <path d="M200 250 C 196 285 210 305 188 330 C 175 350 205 362 192 380"
        stroke="#5a4a45" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- root branches -->
  <path d="M194 312 C 178 320 165 322 150 338" stroke="#5a4a45" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M196 348 C 215 352 228 362 240 372" stroke="#5a4a45" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M190 330 C 175 338 168 348 160 360" stroke="#5a4a45" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- helical stack of resonant rings (leaning spiral) -->
  <g transform="translate(200,200)">
    <!-- rings, drawn back-to-front as overlapping tilted ellipses, ascending and leaning -->
    <ellipse cx="-4" cy="44" rx="44" ry="11" fill="#cdd6c8" stroke="#2b2f33" stroke-width="1.4"/>
    <ellipse cx="-6" cy="30" rx="40" ry="10" fill="#bcc9b6" stroke="#2b2f33" stroke-width="1.3"/>
    <ellipse cx="-8" cy="17" rx="36" ry="9"  fill="#a9b8a2" stroke="#2b2f33" stroke-width="1.2"/>
    <ellipse cx="-10" cy="5"  rx="32" ry="8"  fill="#97a78e" stroke="#2b2f33" stroke-width="1.1"/>
    <ellipse cx="-12" cy="-6" rx="28" ry="7.5" fill="#85967b" stroke="#2b2f33" stroke-width="1.0"/>
    <ellipse cx="-14" cy="-16" rx="24" ry="6.5" fill="#738669" stroke="#2b2f33" stroke-width="0.95"/>
    <ellipse cx="-16" cy="-25" rx="20" ry="5.5" fill="#64785a" stroke="#2b2f33" stroke-width="0.9"/>
    <ellipse cx="-18" cy="-33" rx="16" ry="4.5" fill="#566a4d" stroke="#2b2f33" stroke-width="0.85"/>
    <ellipse cx="-20" cy="-40" rx="12" ry="3.6" fill="#475c40" stroke="#2b2f33" stroke-width="0.8"/>

    <!-- gas-vent accents (methane green) -->
    <circle cx="-20" cy="-40" r="1.6" fill="#8fb56a"/>
    <circle cx="-15" cy="-44" r="1.1" fill="#8fb56a" opacity="0.8"/>
    <circle cx="-24" cy="-42" r="0.9" fill="#8fb56a" opacity="0.7"/>

    <!-- a detached floating ring (offspring) drifting off -->
    <ellipse cx="78" cy="58" rx="14" ry="3.6" fill="#cdd6c8" stroke="#2b2f33" stroke-width="1.0" opacity="0.85"/>
    <path d="M64 58 Q 50 56 38 54" stroke="#6a7a6a" stroke-width="0.7" fill="none" stroke-dasharray="2 3" opacity="0.5"/>
  </g>

  <!-- sound waves suggested as faint arcs -->
  <g stroke="#2b2f33" stroke-width="0.7" fill="none" opacity="0.22">
    <path d="M150 150 Q200 120 250 150"/>
    <path d="M138 140 Q200 100 262 140"/>
    <path d="M126 130 Q200 80 274 130"/>
  </g>

  <!-- scale bar -->
  <line x1="40" y1="380" x2="140" y2="380" stroke="#2b2f33" stroke-width="1.2"/>
  <text x="90" y="374" font-family="serif" font-size="10" fill="#2b2f33" text-anchor="middle">~2 m</text>

  <!-- caption -->
  <text x="200" y="28" font-family="serif" font-size="13" fill="#2b2f33" text-anchor="middle" font-style="italic">Rooted Carillon</text>
  <text x="200" y="43" font-family="serif" font-size="9" fill="#5a5145" text-anchor="middle">rooted aspect · the Mire</text>
</svg>
