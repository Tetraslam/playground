<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#141821"/>
  <!-- vent fissure glow -->
  <ellipse cx="200" cy="372" rx="120" ry="18" fill="#e8590c" opacity="0.55"/>
  <ellipse cx="200" cy="370" rx="70" ry="9" fill="#f5a623" opacity="0.8"/>
  <!-- rising heat shimmer -->
  <path d="M200 370 C 188 330, 212 300, 200 260 C 188 220, 212 190, 200 150"
        stroke="#e8590c" stroke-width="2" fill="none" opacity="0.35" stroke-dasharray="3 6"/>
  <!-- laddermouth column: alternating rings straddling gradient -->
  <g>
    <!-- cold crown -->
    <ellipse cx="200" cy="118" rx="34" ry="7" fill="#6fb3d2"/>
    <rect x="166" y="118" width="68" height="14" fill="#3a7ca5"/>
    <!-- ring stack -->
    <g fill="#cbb78a">
      <rect x="166" y="132" width="68" height="6"/>
      <rect x="166" y="146" width="68" height="6"/>
      <rect x="166" y="160" width="68" height="6"/>
      <rect x="166" y="174" width="68" height="6"/>
      <rect x="166" y="188" width="68" height="6"/>
      <rect x="166" y="202" width="68" height="6"/>
      <rect x="166" y="216" width="68" height="6"/>
      <rect x="166" y="230" width="68" height="6"/>
      <rect x="166" y="244" width="68" height="6"/>
      <rect x="166" y="258" width="68" height="6"/>
      <rect x="166" y="272" width="68" height="6"/>
      <rect x="166" y="286" width="68" height="6"/>
      <rect x="166" y="300" width="68" height="6"/>
      <rect x="166" y="314" width="68" height="6"/>
      <rect x="166" y="328" width="68" height="6"/>
      <rect x="166" y="342" width="68" height="6"/>
    </g>
    <g fill="#7a6b4f" opacity="0.85">
      <rect x="166" y="138" width="68" height="8"/>
      <rect x="166" y="152" width="68" height="8"/>
      <rect x="166" y="166" width="68" height="8"/>
      <rect x="166" y="180" width="68" height="8"/>
      <rect x="166" y="194" width="68" height="8"/>
      <rect x="166" y="208" width="68" height="8"/>
      <rect x="166" y="222" width="68" height="8"/>
      <rect x="166" y="236" width="68" height="8"/>
      <rect x="166" y="250" width="68" height="8"/>
      <rect x="166" y="264" width="68" height="8"/>
      <rect x="166" y="278" width="68" height="8"/>
      <rect x="166" y="292" width="68" height="8"/>
      <rect x="166" y="306" width="68" height="8"/>
      <rect x="166" y="320" width="68" height="8"/>
      <rect x="166" y="334" width="68" height="8"/>
      <rect x="166" y="348" width="68" height="8"/>
    </g>
    <!-- hot base -->
    <rect x="166" y="356" width="68" height="12" fill="#a8401a"/>
    <ellipse cx="200" cy="368" rx="34" ry="6" fill="#e8590c"/>
  </g>
  <!-- thermal gradient labels -->
  <g font-family="ui-monospace, monospace" font-size="9" fill="#6fb3d2">
    <text x="252" y="122">~4°C  crown</text>
  </g>
  <g font-family="ui-monospace, monospace" font-size="9" fill="#e8590c">
    <text x="252" y="366">~320°C base</text>
  </g>
  <g font-family="ui-monospace, monospace" font-size="8" fill="#6a6a78">
    <text x="20" y="24">Thermopleura gradilis — "laddermouth"</text>
    <text x="20" y="388">vent fissure · Seebeck-column lithotroph</text>
  </g>
</svg>
