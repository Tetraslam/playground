<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#eaf0f4"/>

  <!-- distant landmass silhouette -->
  <path d="M0 70 Q80 55 160 72 Q220 60 320 74 Q360 70 400 76 L400 92 L0 92 Z" fill="#cdd6dc" opacity="0.6"/>

  <!-- trailing resonant filaments -->
  <path d="M140 200 C 60 250, 30 300, 20 360" stroke="#c98a3a" stroke-width="1.4" fill="none" opacity="0.85"/>
  <path d="M260 200 C 340 250, 370 300, 380 360" stroke="#c98a3a" stroke-width="1.4" fill="none" opacity="0.85"/>
  <path d="M200 140 C 210 90, 190 60, 200 30" stroke="#c98a3a" stroke-width="1.4" fill="none" opacity="0.85"/>

  <!-- standing-wave nodes along filaments -->
  <g fill="#c98a3a" opacity="0.8">
    <circle cx="100" cy="245" r="2"/>
    <circle cx="60" cy="290" r="2"/>
    <circle cx="300" cy="245" r="2"/>
    <circle cx="340" cy="290" r="2"/>
    <circle cx="205" cy="95" r="2"/>
  </g>

  <!-- aerogel triangular frame -->
  <polygon points="200,140 140,200 260,200" fill="none" stroke="#1f4f5a" stroke-width="2.4"/>
  <!-- inner lattice struts -->
  <line x1="200" y1="140" x2="200" y2="200" stroke="#1f4f5a" stroke-width="0.9" opacity="0.6"/>
  <line x1="140" y1="200" x2="230" y2="170" stroke="#1f4f5a" stroke-width="0.9" opacity="0.6"/>
  <line x1="260" y1="200" x2="170" y2="170" stroke="#1f4f5a" stroke-width="0.9" opacity="0.6"/>

  <!-- photosynthetic film patches -->
  <polygon points="200,140 170,170 200,170" fill="#6fa38b" opacity="0.5"/>
  <polygon points="170,170 140,200 200,170" fill="#6fa38b" opacity="0.35"/>

  <!-- piezo root nodes -->
  <circle cx="200" cy="140" r="3.5" fill="#1f4f5a"/>
  <circle cx="140" cy="200" r="3.5" fill="#1f4f5a"/>
  <circle cx="260" cy="200" r="3.5" fill="#1f4f5a"/>

  <!-- faint pressure-node halo around frame -->
  <ellipse cx="200" cy="180" rx="90" ry="55" fill="none" stroke="#6fa38b" stroke-width="0.7" opacity="0.35" stroke-dasharray="3 4"/>

  <!-- scale bar -->
  <line x1="40" y1="380" x2="100" y2="380" stroke="#1f4f5a" stroke-width="1.2"/>
  <text x="70" y="374" font-family="serif" font-size="10" fill="#1f4f5a" text-anchor="middle">~2 m</text>

  <!-- caption -->
  <text x="200" y="350" font-family="serif" font-size="13" fill="#1f4f5a" text-anchor="middle" font-style="italic">Lissajous pilot</text>
  <text x="200" y="365" font-family="serif" font-size="9" fill="#4a5a60" text-anchor="middle">planform · the Aether</text>
</svg>
