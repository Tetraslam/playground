<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#f4f1ea"/>
  <rect x="12" y="12" width="376" height="276" fill="none" stroke="#2a2a2a" stroke-width="1"/>

  <!-- dorsal wing -->
  <path d="M150 108 L262 92 L212 138 Z" fill="#e8e2d2" stroke="#2a2a2a" stroke-width="1.2"/>
  <line x1="170" y1="105" x2="225" y2="118" stroke="#2a2a2a" stroke-width="0.6"/>

  <!-- ventral wing -->
  <path d="M150 178 L262 214 L214 168 Z" fill="#e8e2d2" stroke="#2a2a2a" stroke-width="1.2"/>
  <line x1="170" y1="182" x2="226" y2="172" stroke="#2a2a2a" stroke-width="0.6"/>

  <!-- body hull + throat sac -->
  <path d="M70 110
           C 120 100, 175 98, 235 104
           L 322 148
           L 322 156
           L 232 184
           C 200 220, 165 238, 138 222
           C 110 206, 78 188, 70 170
           Z"
        fill="#c68a3e" stroke="#2a2a2a" stroke-width="1.3"/>
  <!-- sac striations -->
  <path d="M110 190 C 140 212, 175 222, 205 200" fill="none" stroke="#8a5a1f" stroke-width="0.7"/>
  <path d="M125 175 C 150 198, 178 206, 200 188" fill="none" stroke="#8a5a1f" stroke-width="0.7"/>

  <!-- funnel opening (left) -->
  <ellipse cx="72" cy="142" rx="11" ry="36" fill="#8a2f2f" stroke="#2a2a2a" stroke-width="1.3"/>
  <ellipse cx="78" cy="142" rx="6" ry="28" fill="#3a1414"/>
  <!-- gill combs -->
  <line x1="74" y1="120" x2="74" y2="164" stroke="#f4f1ea" stroke-width="0.7"/>
  <line x1="77" y1="124" x2="77" y2="160" stroke="#f4f1ea" stroke-width="0.7"/>
  <line x1="80" y1="128" x2="80" y2="156" stroke="#f4f1ea" stroke-width="0.7"/>

  <!-- exhaust vents (tail) -->
  <ellipse cx="318" cy="148" rx="4" ry="2.4" fill="#3a1414" stroke="#2a2a2a" stroke-width="0.8"/>
  <ellipse cx="318" cy="157" rx="4" ry="2.4" fill="#3a1414" stroke="#2a2a2a" stroke-width="0.8"/>
  <!-- thrust dashes -->
  <line x1="328" y1="148" x2="346" y2="144" stroke="#8a2f2f" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="328" y1="157" x2="346" y2="161" stroke="#8a2f2f" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- airflow arrow through duct -->
  <path d="M40 142 L66 142" stroke="#8a2f2f" stroke-width="0.8" fill="none" marker-end="url(#a)"/>
  <defs>
    <marker id="a" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#8a2f2f"/>
    </marker>
  </defs>

  <text x="200" y="262" text-anchor="middle" font-family="Georgia, serif"
        font-style="italic" font-size="15" fill="#2a2a2a">Aerochone perpetua</text>
  <text x="200" y="278" text-anchor="middle" font-family="Georgia, serif"
        font-size="9" fill="#5a5a5a">obligate aerial ramjet — Aether</text>
</svg>
