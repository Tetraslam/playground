<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f4ede0"/>

  <!-- water column gradient: cold above, hot below -->
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dfe8ee"/>
      <stop offset="0.55" stop-color="#e8e0d2"/>
      <stop offset="1" stop-color="#e8c9a8"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="400" height="400" fill="url(#water)" opacity="0.7"/>

  <!-- chimney / vent orifice -->
  <g fill="#3a2e26" stroke="#1c1612" stroke-width="1">
    <path d="M 130 400 L 150 300 L 250 300 L 270 400 Z"/>
  </g>
  <!-- hot plume rising -->
  <g fill="none" stroke="#c8503a" stroke-width="2.5" opacity="0.75">
    <path d="M 175 300 Q 168 250 178 210 Q 170 170 182 140"/>
    <path d="M 200 300 Q 195 250 205 210 Q 198 170 210 140"/>
    <path d="M 225 300 Q 220 250 230 210 Q 223 170 235 140"/>
  </g>

  <!-- Cyclotherma tube: vertical, anchored at chimney lip -->
  <!-- outer pyrite sheath -->
  <rect x="186" y="120" width="28" height="185" rx="6" fill="#2a2420" stroke="#100c0a" stroke-width="1"/>
  <!-- hot foot (lower third) tinted by plume -->
  <rect x="186" y="265" width="28" height="40" rx="4" fill="#5a2a1e"/>
  <!-- crown (cold top) -->
  <ellipse cx="200" cy="120" rx="16" ry="8" fill="#4a6a82" stroke="#1c1612" stroke-width="1"/>

  <!-- sealed working-gas chamber (inner) -->
  <rect x="192" y="132" width="16" height="168" rx="3" fill="#cbb89a" opacity="0.55"/>

  <!-- displacer piston mid-stroke -->
  <rect x="190" y="195" width="20" height="26" rx="2" fill="#8a6a3a" stroke="#3a2e1c" stroke-width="1"/>
  <!-- stroke arrows beside displacer -->
  <g stroke="#3a2e1c" stroke-width="1" fill="none">
    <line x1="222" y1="180" x2="222" y2="240"/>
    <polyline points="218,184 222,178 226,184"/>
    <polyline points="218,236 222,242 226,236"/>
  </g>

  <!-- hemolymph check-valve channel ring (side) with flow arrow -->
  <g stroke="#3a2e1c" stroke-width="1.2" fill="none">
    <line x1="214" y1="150" x2="232" y2="150"/>
    <line x1="232" y1="150" x2="232" y2="280"/>
    <line x1="232" y1="280" x2="214" y2="280"/>
  </g>
  <g fill="#3a2e1c">
    <polygon points="223,150 230,147 230,153"/>
  </g>

  <!-- temperature labels -->
  <g font-family="Georgia, serif" font-size="10" fill="#6f5d44">
    <text x="252" y="125">cold crown · 3°C</text>
    <text x="252" y="290">hot foot · 300°C</text>
  </g>

  <!-- title -->
  <g font-family="Georgia, serif" fill="#2e2a22">
    <text x="14" y="30" font-size="15" font-style="italic">Cyclotherma duplex</text>
    <text x="14" y="45" font-size="10" fill="#6f5d44">heartless Stirling-cycle lithotroph · the Vent</text>
  </g>
  <text x="14" y="388" font-size="9" fill="#6f5d44" font-family="Georgia, serif">
    cross-section: displacer shuttles gas between hot foot and cold crown; pressure swing pumps hemolymph
  </text>
</svg>
