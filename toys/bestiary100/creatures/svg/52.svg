<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <!-- Catenavolta aetheria — field guide sketch -->
  <!-- palette: ink #20303f, bladder #cfe6ee, node #d98a2b, thread #8aa3ad -->

  <!-- charge-gradient indication, faint -->
  <line x1="40" y1="30" x2="40" y2="370" stroke="#8aa3ad" stroke-width="0.75" stroke-dasharray="2 4"/>
  <text x="46" y="38" font-family="serif" font-size="9" fill="#8aa3ad" font-style="italic">+ layer</text>
  <text x="46" y="372" font-family="serif" font-size="9" fill="#8aa3ad" font-style="italic">− layer</text>

  <!-- conductive cord -->
  <line x1="150" y1="44" x2="150" y2="356" stroke="#20303f" stroke-width="1.4"/>

  <!-- chain of pneumatocysts, tapering -->
  <circle cx="150" cy="58"  r="15" fill="#cfe6ee" stroke="#20303f" stroke-width="1.2"/>
  <circle cx="150" cy="96"  r="13" fill="#cfe6ee" stroke="#20303f" stroke-width="1.2"/>
  <circle cx="150" cy="131" r="12" fill="#cfe6ee" stroke="#20303f" stroke-width="1.2"/>
  <circle cx="150" cy="164" r="11" fill="#cfe6ee" stroke="#20303f" stroke-width="1.2"/>
  <circle cx="150" cy="195" r="10" fill="#cfe6ee" stroke="#20303f" stroke-width="1.2"/>
  <circle cx="150" cy="224" r="9"  fill="#cfe6ee" stroke="#20303f" stroke-width="1.2"/>
  <circle cx="150" cy="250" r="8"  fill="#cfe6ee" stroke="#20303f" stroke-width="1.2"/>
  <circle cx="150" cy="274" r="7"  fill="#cfe6ee" stroke="#20303f" stroke-width="1.2"/>
  <circle cx="150" cy="296" r="6"  fill="#cfe6ee" stroke="#20303f" stroke-width="1.2"/>
  <circle cx="150" cy="316" r="5"  fill="#cfe6ee" stroke="#20303f" stroke-width="1.2"/>
  <circle cx="150" cy="334" r="4"  fill="#cfe6ee" stroke="#20303f" stroke-width="1.2"/>
  <circle cx="150" cy="350" r="3"  fill="#cfe6ee" stroke="#20303f" stroke-width="1.2"/>

  <!-- charge-harvest nodes (amber) along the cord -->
  <rect x="148" y="112" width="4" height="4" fill="#d98a2b"/>
  <rect x="148" y="182" width="4" height="4" fill="#d98a2b"/>
  <rect x="148" y="258" width="4" height="4" fill="#d98a2b"/>
  <rect x="148" y="322" width="4" height="4" fill="#d98a2b"/>

  <!-- capture-thread fuzz on a few cysts -->
  <g stroke="#8aa3ad" stroke-width="0.6" fill="none">
    <line x1="165" y1="58"  x2="188" y2="52"/>
    <line x1="165" y1="62"  x2="190" y2="66"/>
    <line x1="135" y1="58"  x2="112" y2="54"/>
    <line x1="135" y1="62"  x2="110" y2="68"/>
    <line x1="161" y1="96"  x2="183" y2="100"/>
    <line x1="139" y1="96"  x2="117" y2="92"/>
    <line x1="160" y1="164" x2="178" y2="170"/>
    <line x1="140" y1="164" x2="122" y2="160"/>
    <line x1="159" y1="250" x2="173" y2="256"/>
    <line x1="141" y1="250" x2="127" y2="246"/>
  </g>

  <!-- scale bar -->
  <line x1="220" y1="372" x2="270" y2="372" stroke="#20303f" stroke-width="1"/>
  <line x1="220" y1="369" x2="220" y2="375" stroke="#20303f" stroke-width="1"/>
  <line x1="270" y1="369" x2="270" y2="375" stroke="#20303f" stroke-width="1"/>
  <text x="245" y="367" font-family="serif" font-size="9" fill="#20303f" text-anchor="middle">~10 m</text>

  <!-- caption -->
  <text x="150" y="392" font-family="serif" font-size="11" fill="#20303f" text-anchor="middle" font-style="italic">Catenavolta aetheria</text>
</svg>
