<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#0c0a0f"/>
  <!-- vent glow below -->
  <ellipse cx="200" cy="372" rx="170" ry="34" fill="#7a2a12" opacity="0.55"/>
  <ellipse cx="200" cy="372" rx="90" ry="18" fill="#d05a1e" opacity="0.6"/>
  <!-- fissure floor -->
  <path d="M 0 360 L 120 348 L 180 362 L 220 358 L 300 346 L 400 360 L 400 400 L 0 400 Z" fill="#1a1418"/>
  <!-- rising heat shimmer lines -->
  <g stroke="#d05a1e" stroke-width="0.8" opacity="0.28" fill="none">
    <path d="M 184 356 Q 188 280 196 200 Q 200 140 206 90"/>
    <path d="M 214 356 Q 210 280 204 200 Q 200 150 196 100"/>
    <path d="M 200 356 Q 196 260 208 170 Q 214 110 210 70"/>
  </g>
  <!-- the mineral column (silhouette), slightly tapered -->
  <path d="M 168 354 L 176 90 L 224 90 L 232 354 Z" fill="#3a3340" stroke="#7a7088" stroke-width="1"/>
  <!-- column banding (precipitated layers) -->
  <g stroke="#5a4f63" stroke-width="0.8" opacity="0.8">
    <line x1="170" y1="320" x2="230" y2="320"/>
    <line x1="171" y1="286" x2="229" y2="286"/>
    <line x1="172" y1="252" x2="228" y2="252"/>
    <line x1="173" y1="218" x2="227" y2="218"/>
    <line x1="174" y1="184" x2="226" y2="184"/>
    <line x1="175" y1="150" x2="225" y2="150"/>
    <line x1="176" y1="116" x2="224" y2="116"/>
  </g>
  <!-- bore (hollow center, glowing) -->
  <path d="M 196 354 L 198 96 L 202 96 L 204 354 Z" fill="#1a1014" opacity="0.9"/>
  <path d="M 197 300 L 197 110 L 203 110 L 203 300 Z" fill="#e07028" opacity="0.5"/>
  <!-- crown: fanning mineral-veined membranes -->
  <g>
    <path d="M 176 92 Q 130 60 96 70 Q 110 92 150 96 Q 130 100 108 110 Q 140 116 170 100 Z" fill="#2a2330" stroke="#8a7d96" stroke-width="1"/>
    <path d="M 224 92 Q 270 60 304 70 Q 290 92 250 96 Q 270 100 292 110 Q 260 116 230 100 Z" fill="#2a2330" stroke="#8a7d96" stroke-width="1"/>
    <path d="M 200 88 Q 200 50 188 30 Q 200 44 200 28 Q 200 44 212 30 Q 200 50 200 88 Z" fill="#2a2330" stroke="#8a7d96" stroke-width="1"/>
    <path d="M 180 90 Q 160 56 140 44 Q 166 58 176 88 Z" fill="#2a2330" stroke="#8a7d96" stroke-width="0.8" opacity="0.85"/>
    <path d="M 220 90 Q 240 56 260 44 Q 234 58 224 88 Z" fill="#2a2330" stroke="#8a7d96" stroke-width="0.8" opacity="0.85"/>
  </g>
  <!-- drained brine rivulets down the outside -->
  <g stroke="#5a4f63" stroke-width="0.6" opacity="0.6" fill="none">
    <path d="M 172 100 Q 170 200 170 350"/>
    <path d="M 228 100 Q 230 200 230 350"/>
    <path d="M 180 104 Q 178 220 174 350"/>
    <path d="M 220 104 Q 222 220 226 350"/>
  </g>
  <!-- a shed ingot on the floor -->
  <ellipse cx="118" cy="356" rx="6" ry="3.5" fill="#1a1418" stroke="#8a7d96" stroke-width="0.8"/>
  <ellipse cx="288" cy="358" rx="5" ry="3" fill="#1a1418" stroke="#8a7d96" stroke-width="0.8"/>
  <!-- label -->
  <text x="200" y="392" text-anchor="middle" font-family="monospace" font-size="11" fill="#8a98ad">Auloplith · the Vent</text>
</svg>
