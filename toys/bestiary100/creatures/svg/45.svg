<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#eef3f7"/>
  <!-- faint horizon line for field-guide context -->
  <line x1="0" y1="300" x2="400" y2="300" stroke="#c5d2dd" stroke-width="1" stroke-dasharray="2 4"/>

  <!-- main hexagonal ice plate, slightly tilted -->
  <g transform="translate(200 195) rotate(-8)">
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60"
             fill="#cfe3ef" stroke="#5f86a1" stroke-width="2"/>
    <!-- inner facet line for crystal sense -->
    <polygon points="0,-90 78,-45 78,45 0,90 -78,45 -78,-45"
             fill="none" stroke="#9bb7cb" stroke-width="1"/>

    <!-- brine-channel nerve lacework -->
    <g stroke="#264456" stroke-width="1.1" fill="none" opacity="0.85">
      <path d="M -70,-30 L -20,-10 L 30,-25 L 75,-5"/>
      <path d="M -60,20 L -10,35 L 25,15 L 70,30"/>
      <path d="M -50,-50 L -5,-55 L 40,-45"/>
      <path d="M -45,55 L 10,60 L 55,50"/>
      <path d="M -20,-10 L -10,35"/>
      <path d="M 30,-25 L 25,15"/>
      <path d="M -5,-55 L -5,60"/>
      <path d="M -70,-30 L -50,55"/>
      <path d="M 75,-5 L 70,30"/>
      <path d="M -50,-50 L -70,-30"/>
      <path d="M 40,-45 L 75,-5"/>
    </g>

    <!-- pigment granules clustered on sunward (upper-right) edge -->
    <g fill="#16242e">
      <circle cx="60" cy="-78" r="2.4"/>
      <circle cx="74" cy="-66" r="2.0"/>
      <circle cx="48" cy="-88" r="1.8"/>
      <circle cx="88" cy="-52" r="2.2"/>
      <circle cx="98" cy="-38" r="1.6"/>
      <circle cx="70" cy="-90" r="1.5"/>
      <circle cx="92" cy="-72" r="1.4"/>
    </g>
    <!-- vapor jets from nozzle pores -->
    <g stroke="#5f86a1" stroke-width="1" fill="none" opacity="0.7">
      <path d="M 104,-60 Q 120,-70 134,-78"/>
      <path d="M 88,-52 Q 108,-58 124,-64"/>
      <path d="M 98,-38 Q 116,-40 132,-42"/>
    </g>
  </g>

  <!-- aerosol snow drifting in from upper atmosphere -->
  <g fill="#8aa6b8" opacity="0.7">
    <circle cx="60" cy="60" r="1.3"/>
    <circle cx="95" cy="100" r="1.0"/>
    <circle cx="40" cy="140" r="1.2"/>
    <circle cx="330" cy="80" r="1.1"/>
    <circle cx="350" cy="130" r="1.4"/>
    <circle cx="300" cy="240" r="1.0"/>
    <circle cx="80" cy="240" r="1.2"/>
    <circle cx="50" cy="200" r="0.9"/>
    <circle cx="360" cy="200" r="1.1"/>
  </g>

  <!-- scale bar -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#44586a">
    <line x1="40" y1="360" x2="120" y2="360" stroke="#44586a" stroke-width="1"/>
    <line x1="40" y1="356" x2="40" y2="364" stroke="#44586a" stroke-width="1"/>
    <line x1="120" y1="356" x2="120" y2="364" stroke="#44586a" stroke-width="1"/>
    <text x="80" y="378" text-anchor="middle">~ 1.5 m</text>
  </g>

  <!-- caption -->
  <text x="360" y="378" text-anchor="end" font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="9" font-style="italic" fill="#44586a">Niveiphyton vehens — Rime</text>
</svg>
