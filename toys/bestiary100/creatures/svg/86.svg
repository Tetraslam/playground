<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#120808"/>
  <!-- vent glow below -->
  <ellipse cx="200" cy="360" rx="160" ry="28" fill="#b5431a" fill-opacity="0.25"/>
  <ellipse cx="200" cy="360" rx="90" ry="14" fill="#e8702a" fill-opacity="0.35"/>
  <!-- cold crown haze above -->
  <rect x="0" y="0" width="400" height="70" fill="#1a3340" fill-opacity="0.5"/>
  <!-- nested bells -->
  <g transform="translate(200 70)" stroke="#d8a86a" fill="none" stroke-width="1.4">
    <path d="M-30 0 L30 0 L20 36 L-20 36 Z" fill="#3a1f12" fill-opacity="0.85"/>
    <path d="M-34 44 L34 44 L24 80 L-24 80 Z" fill="#3a1f12" fill-opacity="0.85"/>
    <path d="M-38 88 L38 88 L28 124 L-28 124 Z" fill="#3a1f12" fill-opacity="0.85"/>
    <path d="M-42 132 L42 132 L32 168 L-32 168 Z" fill="#3a1f12" fill-opacity="0.85"/>
    <path d="M-46 176 L46 176 L36 212 L-36 212 Z" fill="#3a1f12" fill-opacity="0.85"/>
    <path d="M-50 220 L50 220 L40 256 L-40 256 Z" fill="#3a1f12" fill-opacity="0.85"/>
  </g>
  <!-- central stalk + working-fluid loop -->
  <g stroke="#e8c46a" stroke-width="1" fill="none" opacity="0.85">
    <line x1="200" y1="78" x2="200" y2="326"/>
    <path d="M200 78 C188 120, 212 160, 200 200 C188 240, 212 280, 200 326"/>
  </g>
  <!-- hot rootlets into chimney -->
  <g stroke="#e8702a" stroke-width="1" fill="none" opacity="0.9">
    <path d="M200 326 C188 340, 180 350, 168 358"/>
    <path d="M200 326 C212 340, 220 350, 232 358"/>
    <path d="M200 326 C200 344, 200 352, 200 360"/>
  </g>
  <!-- condensation motes drifting up from crown -->
  <g fill="#9fd6e8" opacity="0.8">
    <circle cx="186" cy="58" r="1.6"/>
    <circle cx="214" cy="50" r="1.4"/>
    <circle cx="200" cy="40" r="1.2"/>
    <circle cx="178" cy="44" r="1"/>
    <circle cx="222" cy="64" r="1.2"/>
  </g>
  <!-- scale bar -->
  <g stroke="#9a7a55" stroke-width="1" fill="#9a7a55" font-family="serif" font-size="11">
    <line x1="40" y1="370" x2="120" y2="370"/>
    <line x1="40" y1="366" x2="40" y2="374"/>
    <line x1="120" y1="366" x2="120" y2="374"/>
    <text x="80" y="388" text-anchor="middle" stroke="none">~50 cm</text>
  </g>
  <text x="360" y="388" text-anchor="end" font-family="serif" font-size="11"
        font-style="italic" fill="#9a7a55">Stirlingthrix calyculus</text>
</svg>
