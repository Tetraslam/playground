<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#f4ead5"/>
  <!-- sand / field-guide frame -->
  <rect x="20" y="20" width="360" height="360" fill="none" stroke="#7a6a4a" stroke-width="1"/>
  <!-- ground line -->
  <line x1="40" y1="300" x2="360" y2="300" stroke="#7a6a4a" stroke-width="1" stroke-dasharray="3 4"/>
  <!-- melted pit trail -->
  <circle cx="70" cy="312" r="5" fill="none" stroke="#7a6a4a" stroke-width="1"/>
  <circle cx="95" cy="308" r="5" fill="none" stroke="#7a6a4a" stroke-width="1"/>
  <circle cx="120" cy="314" r="5" fill="none" stroke="#7a6a4a" stroke-width="1"/>
  <circle cx="145" cy="310" r="5" fill="none" stroke="#7a6a4a" stroke-width="1"/>
  <circle cx="170" cy="316" r="5" fill="none" stroke="#7a6a4a" stroke-width="1"/>
  <circle cx="195" cy="312" r="5" fill="none" stroke="#7a6a4a" stroke-width="1"/>

  <!-- six facet legs -->
  <g stroke="#2a3a4a" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="200" y1="130" x2="200" y2="100"/>
    <line x1="262" y1="166" x2="290" y2="150"/>
    <line x1="262" y1="234" x2="290" y2="250"/>
    <line x1="200" y1="270" x2="200" y2="300"/>
    <line x1="138" y1="234" x2="110" y2="250"/>
    <line x1="138" y1="166" x2="110" y2="150"/>
  </g>

  <!-- lens body: outer hex -->
  <polygon points="200,130 262,166 262,234 200,270 138,234 138,166"
           fill="#bcd6e0" fill-opacity="0.55" stroke="#3a5a6a" stroke-width="2"/>
  <!-- refraction streaks -->
  <line x1="200" y1="130" x2="200" y2="270" stroke="#3a5a6a" stroke-width="0.8" stroke-dasharray="2 6"/>
  <line x1="138" y1="166" x2="262" y2="234" stroke="#3a5a6a" stroke-width="0.8" stroke-dasharray="2 6"/>
  <line x1="262" y1="166" x2="138" y2="234" stroke="#3a5a6a" stroke-width="0.8" stroke-dasharray="2 6"/>

  <!-- focused sunbeam -->
  <polygon points="178,150 222,150 215,205 185,205" fill="#fff6c8" fill-opacity="0.6"/>
  <line x1="200" y1="100" x2="200" y2="130" stroke="#e8c84a" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ventral black mat (inner hex) -->
  <polygon points="200,165 232,184 232,216 200,235 168,216 168,184"
           fill="#1a1a1a" fill-opacity="0.85"/>

  <!-- labels -->
  <text x="300" y="120" font-family="serif" font-size="13" font-style="italic" fill="#2a2a2a">Dioptra</text>
  <text x="300" y="136" font-family="serif" font-size="13" font-style="italic" fill="#2a2a2a">hexaphragma</text>
  <text x="40" y="380" font-family="serif" font-size="10" fill="#5a4a2a">dorsal aspect · x1.2 · Glass Wastes</text>
</svg>
