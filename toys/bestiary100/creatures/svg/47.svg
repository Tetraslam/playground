<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0c1622"/>
  <!-- thin atmospheric haze -->
  <g stroke="#1d3146" stroke-width="0.5" fill="none" opacity="0.6">
    <path d="M0 80 L400 80 M0 180 L400 180 M0 280 L400 280"/>
  </g>
  <!-- aerial plankton motes -->
  <g fill="#3f5d7a">
    <circle cx="70" cy="60" r="1.2"/>
    <circle cx="320" cy="110" r="1"/>
    <circle cx="340" cy="240" r="1.4"/>
    <circle cx="60" cy="300" r="1"/>
    <circle cx="150" cy="50" r="0.9"/>
    <circle cx="280" cy="320" r="1.2"/>
    <circle cx="100" cy="200" r="0.8"/>
    <circle cx="310" cy="170" r="1"/>
    <circle cx="50" cy="150" r="0.9"/>
    <circle cx="350" cy="60" r="1.1"/>
  </g>
  <!-- the spine: vertical electret rod -->
  <g transform="translate(200 30)">
    <!-- bottle-brush filaments, left and right -->
    <g stroke="#7fa9c9" stroke-width="0.6" opacity="0.85">
      <!-- row 1 -->
      <line x1="0" y1="10" x2="-34" y2="2"/>
      <line x1="0" y1="10" x2="34" y2="2"/>
      <line x1="0" y1="10" x2="-30" y2="20"/>
      <line x1="0" y1="10" x2="30" y2="20"/>
      <!-- row 2 -->
      <line x1="0" y1="40" x2="-40" y2="32"/>
      <line x1="0" y1="40" x2="40" y2="32"/>
      <line x1="0" y1="40" x2="-38" y2="50"/>
      <line x1="0" y1="40" x2="38" y2="50"/>
      <!-- row 3 -->
      <line x1="0" y1="70" x2="-44" y2="62"/>
      <line x1="0" y1="70" x2="44" y2="62"/>
      <line x1="0" y1="70" x2="-42" y2="80"/>
      <line x1="0" y1="70" x2="42" y2="80"/>
      <!-- row 4 -->
      <line x1="0" y1="100" x2="-46" y2="92"/>
      <line x1="0" y1="100" x2="46" y2="92"/>
      <line x1="0" y1="100" x2="-44" y2="110"/>
      <line x1="0" y1="100" x2="44" y2="110"/>
      <!-- row 5 -->
      <line x1="0" y1="130" x2="-44" y2="122"/>
      <line x1="0" y1="130" x2="44" y2="122"/>
      <line x1="0" y1="130" x2="-40" y2="140"/>
      <line x1="0" y1="130" x2="40" y2="140"/>
      <!-- row 6 -->
      <line x1="0" y1="160" x2="-38" y2="152"/>
      <line x1="0" y1="160" x2="38" y2="152"/>
      <line x1="0" y1="160" x2="-34" y2="170"/>
      <line x1="0" y1="160" x2="34" y2="170"/>
      <!-- row 7 -->
      <line x1="0" y1="190" x2="-30" y2="182"/>
      <line x1="0" y1="190" x2="30" y2="182"/>
      <line x1="0" y1="190" x2="-26" y2="200"/>
      <line x1="0" y1="190" x2="26" y2="200"/>
      <!-- row 8 -->
      <line x1="0" y1="220" x2="-22" y2="212"/>
      <line x1="0" y1="220" x2="22" y2="212"/>
      <line x1="0" y1="220" x2="-18" y2="230"/>
      <line x1="0" y1="220" x2="18" y2="230"/>
    </g>
    <!-- the charged spine -->
    <line x1="0" y1="0" x2="0" y2="250" stroke="#d8e6f2" stroke-width="2.4"/>
    <!-- clubbed base / stomach -->
    <ellipse cx="0" cy="262" rx="14" ry="18" fill="#c9a3e8" fill-opacity="0.55"
             stroke="#a37fd0" stroke-width="1"/>
    <!-- mouth -->
    <circle cx="0" cy="270" r="3" fill="#2a1830"/>
    <!-- precipitated food motes caught on bristles -->
    <g fill="#e8c7ff">
      <circle cx="-34" cy="2" r="1.3"/>
      <circle cx="38" cy="50" r="1.1"/>
      <circle cx="-42" cy="80" r="1.4"/>
      <circle cx="44" cy="110" r="1"/>
      <circle cx="-26" cy="200" r="1.2"/>
    </g>
    <!-- faint corona hint at tip -->
    <circle cx="0" cy="0" r="3" fill="#f4f0e0" opacity="0.8"/>
  </g>
  <!-- scale bar -->
  <g stroke="#8aa0bd" stroke-width="1" fill="#8aa0bd" font-family="serif" font-size="11">
    <line x1="40" y1="370" x2="160" y2="370"/>
    <line x1="40" y1="366" x2="40" y2="374"/>
    <line x1="160" y1="366" x2="160" y2="374"/>
    <text x="100" y="388" text-anchor="middle" stroke="none">~1.5 m</text>
  </g>
  <text x="360" y="388" text-anchor="end" font-family="serif" font-size="11"
        font-style="italic" fill="#8aa0bd">Aetherothrix catenaria</text>
</svg>
