<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#0a1420"/>
  <!-- fissure glow at base -->
  <ellipse cx="200" cy="372" rx="120" ry="18" fill="#e8732a" opacity="0.55"/>
  <ellipse cx="200" cy="372" rx="70" ry="9" fill="#f4c542" opacity="0.8"/>
  <!-- fissure crack -->
  <path d="M120 380 L200 368 L280 380" stroke="#7a1f0a" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- stalk: alternating rings -->
  <rect x="194" y="120" width="12" height="250" fill="#3a4a5a"/>
  <g>
    <rect x="193" y="140" width="14" height="6" fill="#9fb3c8"/>
    <rect x="193" y="165" width="14" height="6" fill="#566b80"/>
    <rect x="193" y="190" width="14" height="6" fill="#9fb3c8"/>
    <rect x="193" y="215" width="14" height="6" fill="#566b80"/>
    <rect x="193" y="240" width="14" height="6" fill="#9fb3c8"/>
    <rect x="193" y="265" width="14" height="6" fill="#566b80"/>
    <rect x="193" y="290" width="14" height="6" fill="#9fb3c8"/>
    <rect x="193" y="315" width="14" height="6" fill="#566b80"/>
    <rect x="193" y="340" width="14" height="6" fill="#9fb3c8"/>
  </g>
  <!-- cold radiating sail at top -->
  <path d="M200 120 L80 60 L110 130 L200 120 Z" fill="#1b3a4a" stroke="#3a6a80" stroke-width="1.5"/>
  <path d="M200 120 L320 60 L290 130 L200 120 Z" fill="#1b3a4a" stroke="#3a6a80" stroke-width="1.5"/>
  <path d="M200 120 L150 40 L195 120 Z" fill="#244a5a" stroke="#3a6a80" stroke-width="1"/>
  <path d="M200 120 L250 40 L205 120 Z" fill="#244a5a" stroke="#3a6a80" stroke-width="1"/>
  <!-- heat ripples rising -->
  <path d="M196 110 Q198 95 196 80" stroke="#e8732a" stroke-width="1.2" fill="none" opacity="0.5"/>
  <path d="M204 105 Q202 88 204 72" stroke="#e8732a" stroke-width="1.2" fill="none" opacity="0.5"/>
  <!-- label -->
  <text x="200" y="397" text-anchor="middle" font-family="serif" font-style="italic" font-size="13" fill="#9fb3c8">Thermopelta fissura</text>
</svg>
