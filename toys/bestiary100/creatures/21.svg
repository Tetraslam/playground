<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0c1014"/>
  <!-- canopy band (underglow ceiling, parasitized fungal mat) -->
  <rect x="0" y="0" width="400" height="46" fill="#1a2418"/>
  <g fill="#243018" opacity="0.9">
    <ellipse cx="60" cy="34" rx="40" ry="10"/>
    <ellipse cx="180" cy="30" rx="55" ry="11"/>
    <ellipse cx="310" cy="36" rx="48" ry="10"/>
  </g>
  <!-- faint glow leaking from canopy -->
  <ellipse cx="200" cy="46" rx="180" ry="10" fill="#3a5a2a" opacity="0.25"/>

  <!-- wickfall curtain: thin tubes descending, droplets at tips -->
  <g stroke="#6f7a6a" stroke-width="0.8" fill="none" opacity="0.85">
    <line x1="70"  y1="46" x2="70"  y2="300"/>
    <line x1="104" y1="46" x2="104" y2="338"/>
    <line x1="138" y1="46" x2="138" y2="278"/>
    <line x1="172" y1="46" x2="172" y2="322"/>
    <line x1="206" y1="46" x2="206" y2="294"/>
    <line x1="240" y1="46" x2="240" y2="352"/>
    <line x1="274" y1="46" x2="274" y2="286"/>
    <line x1="308" y1="46" x2="308" y2="316"/>
    <line x1="342" y1="46" x2="342" y2="300"/>
  </g>

  <!-- pendant droplets: stolen-sap glow with halo -->
  <g>
    <!-- droplet halos -->
    <g fill="#9fe8c4" opacity="0.18">
      <circle cx="70"  cy="300" r="9"/>
      <circle cx="104" cy="338" r="9"/>
      <circle cx="138" cy="278" r="9"/>
      <circle cx="172" cy="322" r="9"/>
      <circle cx="206" cy="294" r="9"/>
      <circle cx="240" cy="352" r="9"/>
      <circle cx="274" cy="286" r="9"/>
      <circle cx="308" cy="316" r="9"/>
      <circle cx="342" cy="300" r="9"/>
    </g>
    <!-- droplet beads -->
    <g fill="#c7f5dd">
      <circle cx="70"  cy="300" r="2.6"/>
      <circle cx="104" cy="338" r="2.6"/>
      <circle cx="138" cy="278" r="2.6"/>
      <circle cx="172" cy="322" r="2.6"/>
      <circle cx="206" cy="294" r="2.6"/>
      <circle cx="240" cy="352" r="2.6"/>
      <circle cx="274" cy="286" r="2.6"/>
      <circle cx="308" cy="316" r="2.6"/>
      <circle cx="342" cy="300" r="2.6"/>
    </g>
  </g>

  <!-- a single caught prey: dim moth stuck to one droplet -->
  <g stroke="#6f7a6a" stroke-width="0.6" fill="#2a2620" opacity="0.95">
    <ellipse cx="240" cy="352" rx="4.5" ry="2"/>
  </g>

  <!-- scale bar -->
  <g stroke="#71717a" stroke-width="1" fill="#71717a" font-family="monospace" font-size="9">
    <line x1="318" y1="380" x2="378" y2="380"/>
    <line x1="318" y1="376" x2="318" y2="384"/>
    <line x1="378" y1="376" x2="378" y2="384"/>
    <text x="348" y="394" text-anchor="middle" stroke="none">~2 m</text>
  </g>

  <!-- label -->
  <text x="14" y="24" fill="#a1a1aa" font-family="monospace" font-size="11">Lucisiphon pendens</text>
  <text x="14" y="38" fill="#71717a" font-family="monospace" font-size="9">Wickfall · pendant curtain</text>
</svg>
