<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f4ead5"/>
  <!-- sand / glass surface tone -->
  <rect y="250" width="400" height="150" fill="#e8d9b8"/>
  <!-- etched grating trail -->
  <g stroke="#b89a6a" stroke-width="1">
    <line x1="40" y1="300" x2="120" y2="300"/>
    <line x1="40" y1="306" x2="120" y2="306"/>
    <line x1="40" y1="312" x2="120" y2="312"/>
    <line x1="160" y1="290" x2="240" y2="290"/>
    <line x1="160" y1="296" x2="240" y2="296"/>
    <line x1="160" y1="302" x2="240" y2="302"/>
  </g>
  <!-- light rays converging through the lens -->
  <g stroke="#e8a13c" stroke-width="1.2" opacity="0.85">
    <line x1="120" y1="20" x2="200" y2="170"/>
    <line x1="200" y1="10" x2="200" y2="170"/>
    <line x1="280" y1="20" x2="200" y2="170"/>
  </g>
  <!-- focused beam onto surface -->
  <line x1="200" y1="170" x2="200" y2="270" stroke="#d9791c" stroke-width="1.6"/>
  <!-- creature: dark ovoid body -->
  <ellipse cx="200" cy="220" rx="55" ry="32" fill="#2b2a33"/>
  <!-- ventral sole hint -->
  <ellipse cx="200" cy="232" rx="45" ry="6" fill="#1a1920" opacity="0.6"/>
  <!-- muscular pedicel -->
  <rect x="194" y="170" width="12" height="50" fill="#3d3b46"/>
  <!-- faceted quartz lens (hexagonal prism, top-down) -->
  <polygon points="200,120 250,150 250,200 200,230 150,200 150,150"
           fill="#cfe8ee" stroke="#6fa6b8" stroke-width="1.5"/>
  <!-- lens facet lines -->
  <line x1="200" y1="120" x2="200" y2="230" stroke="#6fa6b8" stroke-width="0.8"/>
  <line x1="150" y1="150" x2="250" y2="200" stroke="#6fa6b8" stroke-width="0.8"/>
  <line x1="250" y1="150" x2="150" y2="200" stroke="#6fa6b8" stroke-width="0.8"/>
  <!-- highlight on lens -->
  <polygon points="200,120 250,150 200,175" fill="#ffffff" opacity="0.45"/>
  <!-- scale bar -->
  <g stroke="#3a3326" stroke-width="1" fill="#3a3326" font-family="serif" font-size="11">
    <line x1="310" y1="380" x2="370" y2="380"/>
    <line x1="310" y1="376" x2="310" y2="384"/>
    <line x1="370" y1="376" x2="370" y2="384"/>
    <text x="340" y="372" text-anchor="middle">2 cm</text>
  </g>
  <!-- caption -->
  <text x="20" y="30" font-family="serif" font-size="13" fill="#3a3326">Veridiographis vitrea</text>
  <text x="20" y="46" font-family="serif" font-size="10" font-style="italic" fill="#6a5d3e">dorsal view, mid-inscription</text>
</svg>
