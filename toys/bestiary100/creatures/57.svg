<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#e8e2d0"/>
  <!-- mire surface -->
  <rect x="0" y="280" width="400" height="120" fill="#9a8a6e"/>
  <line x1="0" y1="280" x2="400" y2="280" stroke="#6b5d44" stroke-width="1"/>
  <!-- cleaned furrow trail -->
  <path d="M 20 330 Q 120 326 200 318 Q 250 313 280 300" fill="none" stroke="#c9b896" stroke-width="3"/>
  <path d="M 20 348 Q 130 344 210 336" fill="none" stroke="#c9b896" stroke-width="2"/>
  <!-- torus body: outer ring + inner aperture, foreshortened as ellipse -->
  <ellipse cx="280" cy="290" rx="78" ry="30" fill="none" stroke="#4a4334" stroke-width="2.5"/>
  <ellipse cx="280" cy="290" rx="62" ry="20" fill="#c9b896" stroke="#4a4334" stroke-width="1.5"/>
  <ellipse cx="280" cy="290" rx="22" ry="7" fill="#4a4334"/>
  <!-- cilia bands (tick marks around outer ring) -->
  <g stroke="#3a342a" stroke-width="1">
    <line x1="202" y1="290" x2="196" y2="290"/>
    <line x1="214" y1="272" x2="208" y2="268"/>
    <line x1="236" y1="258" x2="232" y2="252"/>
    <line x1="262" y1="252" x2="260" y2="245"/>
    <line x1="280" y1="250" x2="280" y2="243"/>
    <line x1="298" y1="252" x2="300" y2="245"/>
    <line x1="324" y1="258" x2="328" y2="252"/>
    <line x1="346" y1="272" x2="352" y2="268"/>
    <line x1="358" y1="290" x2="364" y2="290"/>
    <line x1="346" y1="308" x2="352" y2="312"/>
    <line x1="324" y1="322" x2="328" y2="328"/>
    <line x1="298" y1="328" x2="300" y2="335"/>
    <line x1="280" y1="330" x2="280" y2="337"/>
    <line x1="262" y1="328" x2="260" y2="335"/>
    <line x1="236" y1="322" x2="232" y2="328"/>
    <line x1="214" y1="308" x2="208" y2="312"/>
  </g>
  <!-- amber gut contents (visible through wall) -->
  <ellipse cx="252" cy="285" rx="6" ry="3" fill="#c8923a" opacity="0.7"/>
  <ellipse cx="300" cy="293" rx="7" ry="3" fill="#c8923a" opacity="0.7"/>
  <ellipse cx="280" cy="278" rx="5" ry="2.5" fill="#c8923a" opacity="0.7"/>
  <!-- motion arrows -->
  <path d="M 180 300 q 20 -4 35 -2" fill="none" stroke="#6b5d44" stroke-width="1.2" stroke-dasharray="3 3"/>
  <polygon points="215,298 209,295 209,301" fill="#6b5d44"/>
  <!-- label -->
  <text x="200" y="385" text-anchor="middle" font-family="serif" font-size="13" fill="#3f3422" font-style="italic">Trochosoma cinerea</text>
</svg>
