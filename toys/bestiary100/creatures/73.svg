<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#f4ead0"/>

  <!-- title -->
  <g fill="#2f2418" font-family="serif">
    <text x="20" y="30" font-size="15" font-style="italic">Pilothusk</text>
    <text x="20" y="46" font-size="10">Cladocysta vehens — rolled gall, cutaway</text>
  </g>

  <!-- canopy bark surface -->
  <rect x="0" y="360" width="400" height="40" fill="#6b4a2a"/>
  <g stroke="#4a321c" stroke-width="1" fill="none" opacity="0.7">
    <path d="M0 372 Q120 368 240 374 T400 372"/>
    <path d="M0 388 Q100 384 220 390 T400 388"/>
  </g>

  <!-- rolling direction arrow, above the gall -->
  <g stroke="#2f2418" stroke-width="1.4" fill="none" opacity="0.8" stroke-dasharray="4 3">
    <path d="M120 200 A 95 38 0 0 1 278 198"/>
  </g>
  <polygon points="278,198 268,193 270,203" fill="#2f2418" opacity="0.8"/>

  <!-- gall shell outline (full circle, thin) -->
  <circle cx="200" cy="290" r="70" fill="none" stroke="#2f2418" stroke-width="1.4"/>

  <!-- left hemisphere: solid photosynthetic shell with leaf venation -->
  <path d="M 200,220 A 70,70 0 0 0 200,360 Z" fill="#7fae5a"/>
  <g stroke="#2f2418" stroke-width="0.8" fill="none" opacity="0.55">
    <path d="M200,228 Q175,255 150,275"/>
    <path d="M200,250 Q170,275 148,300"/>
    <path d="M200,285 Q172,305 160,335"/>
    <path d="M200,320 Q180,335 175,355"/>
  </g>

  <!-- right hemisphere: cutaway interior -->
  <!-- creature body -->
  <ellipse cx="212" cy="285" rx="13" ry="19" fill="#2f2418"/>
  <!-- equatorial photoreceptor belt -->
  <g stroke="#7fae5a" stroke-width="1" fill="none">
    <path d="M199,285 Q212,282 225,285"/>
  </g>
  <!-- rootlet proboscis to inner wall (upper right) -->
  <path d="M222,272 Q240,260 256,246" stroke="#2f2418" stroke-width="1.4" fill="none"/>
  <!-- tiller-limb from body down through basal pore to bark -->
  <path d="M210,303 Q204,330 200,358 L197,372" stroke="#2f2418" stroke-width="1.6" fill="none"/>
  <!-- basal pore -->
  <ellipse cx="200" cy="360" rx="5" ry="3" fill="#2f2418"/>

  <!-- sun glint on shell -->
  <circle cx="178" cy="252" r="3" fill="#f4ead0"/>

  <!-- scale bar -->
  <g stroke="#2f2418" stroke-width="1" fill="#2f2418" font-family="serif" font-size="10">
    <line x1="290" y1="345" x2="350" y2="345"/>
    <line x1="290" y1="341" x2="290" y2="349"/>
    <line x1="350" y1="341" x2="350" y2="349"/>
    <text x="320" y="338" text-anchor="middle">8 cm</text>
  </g>
</svg>
