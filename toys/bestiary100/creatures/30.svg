<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0e1620"/>
  <!-- high sun -->
  <circle cx="320" cy="70" r="22" fill="#e8c66a" opacity="0.85"/>
  <circle cx="320" cy="70" r="34" fill="none" stroke="#e8c66a" stroke-width="1" opacity="0.3"/>
  <!-- colony: chain of pneumatophores arcing across the sky -->
  <g fill="#cfe3df" stroke="#7fa8a0" stroke-width="1">
    <ellipse cx="60"  cy="180" rx="14" ry="22"/>
    <ellipse cx="96"  cy="168" rx="15" ry="24"/>
    <ellipse cx="134" cy="162" rx="16" ry="26"/>
    <ellipse cx="174" cy="164" rx="16" ry="26"/>
    <ellipse cx="214" cy="174" rx="15" ry="24"/>
    <ellipse cx="252" cy="190" rx="14" ry="22"/>
    <ellipse cx="288" cy="210" rx="12" ry="19"/>
  </g>
  <!-- shared nerve-cord -->
  <path d="M60 180 Q170 150 288 210" fill="none" stroke="#9fb8b2" stroke-width="1.5" opacity="0.8"/>
  <!-- dangling electrostatic filaments -->
  <g stroke="#e8c66a" stroke-width="0.8" opacity="0.7" fill="none">
    <path d="M70 200 Q72 260 68 340"/>
    <path d="M104 190 Q108 250 102 350"/>
    <path d="M140 186 Q144 250 138 360"/>
    <path d="M178 188 Q182 255 176 355"/>
    <path d="M216 198 Q220 260 214 345"/>
    <path d="M254 212 Q258 270 252 340"/>
    <path d="M288 228 Q292 280 286 330"/>
  </g>
  <!-- snagged plankton motes -->
  <g fill="#e8c66a">
    <circle cx="68" cy="280" r="1.6"/>
    <circle cx="102" cy="300" r="1.4"/>
    <circle cx="144" cy="270" r="1.6"/>
    <circle cx="182" cy="320" r="1.4"/>
    <circle cx="220" cy="290" r="1.6"/>
    <circle cx="258" cy="310" r="1.4"/>
  </g>
  <!-- vented oxygen pore, one bladder -->
  <circle cx="134" cy="148" r="1.5" fill="#0e1620" stroke="#7fa8a0" stroke-width="0.8"/>
  <!-- label -->
  <text x="20" y="385" font-family="monospace" font-size="11" fill="#cfe3df">Mistcleft ribbon — Aether phototroph</text>
</svg>
