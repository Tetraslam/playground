<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#14121a"/>
  <!-- field-guide frame -->
  <rect x="14" y="14" width="372" height="372" fill="none" stroke="#3a3447" stroke-width="1"/>
  <!-- caption -->
  <text x="200" y="372" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#c9c0d8">Thermocele convecta</text>

  <!-- logarithmic spiral chimney: pyrite black, hot orange core -->
  <!-- drawn as a thick-stroked spiral path -->
  <path d="M 200 200
           m 0 0
           a 6 6 0 1 0 12 0
           a 12 12 0 1 0 -24 0
           a 22 22 0 1 0 44 0
           a 36 36 0 1 0 -72 0
           a 54 54 0 1 0 108 0
           a 76 76 0 1 0 -152 0
           a 104 104 0 1 0 208 0
           a 136 136 0 1 0 -272 0"
        fill="none" stroke="#1c1a22" stroke-width="9" stroke-linecap="round"/>

  <!-- inner hot terminal (glow) -->
  <circle cx="200" cy="200" r="14" fill="#ff7a1a"/>
  <circle cx="200" cy="200" r="7" fill="#ffd27a"/>

  <!-- counter-current channel accent (cyan) along the cold inner leaf -->
  <path d="M 200 200
           m 0 0
           a 12 12 0 1 0 24 0
           a 22 22 0 1 0 -44 0
           a 36 36 0 1 0 72 0
           a 54 54 0 1 0 -108 0
           a 76 76 0 1 0 152 0
           a 104 104 0 1 0 -208 0"
        fill="none" stroke="#3fd0c4" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.8"/>

  <!-- a budding glander at the cold rim -->
  <circle cx="336" cy="200" r="6" fill="#1c1a22" stroke="#3fd0c4" stroke-width="1"/>
  <line x1="336" y1="194" x2="346" y2="178" stroke="#3fd0c4" stroke-width="0.8" opacity="0.7"/>
  <text x="350" y="174" font-family="Georgia, serif" font-size="9" fill="#6f8a89">glander</text>

  <!-- gradient arrow annotation -->
  <line x1="60" y1="60" x2="120" y2="120" stroke="#ff7a1a" stroke-width="0.8" opacity="0.6"/>
  <text x="44" y="56" font-family="Georgia, serif" font-size="9" fill="#b07a4a">hot rim</text>
  <line x1="60" y1="340" x2="120" y2="280" stroke="#3fd0c4" stroke-width="0.8" opacity="0.6"/>
  <text x="36" y="352" font-family="Georgia, serif" font-size="9" fill="#5fa39c">cold core</text>
</svg>
