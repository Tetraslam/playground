    <path d="M200 280 Q150 240 110 200 Q90 180 70 150"/>
    <path d="M200 280 Q170 230 140 190 Q120 160 95 120"/>
    <path d="M200 280 Q200 220 200 170 Q200 140 200 100"/>
    <path d="M200 280 Q230 230 260 190 Q280 160 305 120"/>
    <path d="M200 280 Q250 240 290 200 Q310 180 330 150"/>
    <path d="M200 280 Q160 300 120 320 Q95 335 70 350"/>
    <path d="M200 280 Q240 300 280 320 Q305 335 330 350"/>
  </g>
