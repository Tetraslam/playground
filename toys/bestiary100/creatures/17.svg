  <path d="M40 360 Q200 250 360 360" stroke="#2a6a6a" stroke-width="1.5" fill="none" stroke-dasharray="3 4"/>
  <circle cx="118" cy="305" r="3" fill="#2a6a6a"/>
  <circle cx="282" cy="305" r="3" fill="#2a6a6a"/>
  <!-- field-guide label -->
  <text x="200" y="38" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#d8cdb0">Vascularium mirensis</text>
  <text x="200" y="56" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#8a8470">mire surface · graft-chimera · ×0.08</text>
</svg>
