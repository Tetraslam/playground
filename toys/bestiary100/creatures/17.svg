  <g stroke="#6e1a26" stroke-width="1.2" fill="none" stroke-linecap="round">
    <path d="M110 200 Q90 195 70 205"/>
    <path d="M140 190 Q125 175 110 165"/>
    <path d="M200 170 Q185 150 175 135"/>
    <path d="M200 170 Q215 150 225 135"/>
    <path d="M260 190 Q275 175 290 165"/>
    <path d="M290 200 Q310 195 330 205"/>
