<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f4ede0"/>
  <!-- bedrock strata -->
  <g stroke="#b9a98c" stroke-width="1" fill="#cbb89a">
    <rect x="0" y="160" width="400" height="240"/>
    <line x1="0" y1="210" x2="400" y2="210" stroke="#a8957a"/>
    <line x1="0" y1="270" x2="400" y2="270" stroke="#a8957a"/>
    <line x1="0" y1="330" x2="400" y2="330" stroke="#a8957a"/>
  </g>
  <!-- surface line -->
  <line x1="0" y1="160" x2="400" y2="160" stroke="#6f5d44" stroke-width="1.5"/>

  <!-- rib-mold chamber, negative-cast of dissolved fossil -->
  <!-- amber gelatinous body filling the void -->
  <path d="M 150 160
           Q 140 200 160 240
           Q 170 280 200 300
           Q 230 280 240 240
           Q 260 200 250 160 Z"
        fill="#c8893a" opacity="0.85"/>
  <!-- rib-ridges mimicked on the body -->
  <g stroke="#8a5a1f" stroke-width="1.2" fill="none" opacity="0.8">
    <path d="M 158 175 Q 200 195 242 175"/>
    <path d="M 156 200 Q 200 222 244 200"/>
    <path d="M 158 225 Q 200 248 242 225"/>
    <path d="M 164 250 Q 200 270 236 250"/>
  </g>

  <!-- thin calcite lid at surface suture -->
  <line x1="150" y1="160" x2="250" y2="160" stroke="#e8e2d2" stroke-width="2.5"/>
  <line x1="150" y1="160" x2="250" y2="160" stroke="#9a8a6a" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- small scavenger above, about to step on lid -->
  <g fill="#4a3a28">
    <ellipse cx="200" cy="140" rx="9" ry="5"/>
    <line x1="194" y1="143" x2="191" y2="158" stroke="#4a3a28" stroke-width="1.5"/>
    <line x1="206" y1="143" x2="209" y2="158" stroke="#4a3a28" stroke-width="1.5"/>
    <circle cx="203" cy="139" r="0.9" fill="#f4ede0"/>
  </g>

  <!-- label -->
  <g font-family="Georgia, serif" fill="#3a2e1c">
    <text x="14" y="32" font-size="15" font-style="italic">Taphocastus negativus</text>
    <text x="14" y="48" font-size="10" fill="#6f5d44">negative-cast ambush predator · Bone Fields</text>
    <text x="14" y="388" font-size="9" fill="#6f5d44">cross-section: specimen occupying a dissolved rib-mold</text>
  </g>
</svg>
