<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0e1a22"/>
  <!-- vent fissure glow -->
  <path d="M40 380 Q200 350 360 380 L360 400 L40 400 Z" fill="#7a2410"/>
  <path d="M150 380 Q200 360 250 380 L250 400 L150 400 Z" fill="#c85a1e"/>
  <!-- riser: braided capillary bundle -->
  <g stroke="#e8dcc0" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M200 360 Q196 300 200 240 Q204 180 200 120"/>
    <path d="M196 358 Q200 300 196 240 Q200 180 196 120" opacity="0.7"/>
    <path d="M204 358 Q200 300 204 240 Q200 180 204 120" opacity="0.7"/>
  </g>
  <!-- luminescent condensation nodes -->
  <g fill="#5fc8c8">
    <circle cx="200" cy="300" r="2.5"/>
    <circle cx="198" cy="240" r="2.5"/>
    <circle cx="202" cy="180" r="2.5"/>
    <circle cx="200" cy="120" r="2.5"/>
  </g>
  <!-- hot foot: iron-sulfide grip pad wedged in fissure -->
  <path d="M180 360 L220 360 L214 384 L186 384 Z" fill="#d97a2e"/>
  <line x1="190" y1="370" x2="210" y2="370" stroke="#7a2410" stroke-width="1"/>
  <!-- cold apex: condenser radiator fan -->
  <g stroke="#e8dcc0" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M200 120 L170 80"/>
    <path d="M200 120 L185 70"/>
    <path d="M200 120 L200 66"/>
    <path d="M200 120 L215 70"/>
    <path d="M200 120 L230 80"/>
  </g>
  <circle cx="200" cy="120" r="8" fill="#1a1a1a" stroke="#e8dcc0" stroke-width="2"/>
  <!-- field-guide labels -->
  <g font-family="ui-sans-serif, system-ui" font-size="10" fill="#9aa7ad">
    <text x="240" y="124">condenser apex (~4°C)</text>
    <text x="240" y="240">riser — two-phase loop</text>
    <text x="240" y="364">foot / lithotroph film (~400°C)</text>
    <line x1="232" y1="120" x2="222" y2="120" stroke="#9aa7ad"/>
    <line x1="232" y1="236" x2="210" y2="236" stroke="#9aa7ad"/>
    <line x1="232" y1="360" x2="222" y2="360" stroke="#9aa7ad"/>
  </g>
  <text x="20" y="28" font-family="ui-serif, Georgia, serif" font-size="14" fill="#e8dcc0" font-style="italic">Tephrachord</text>
  <text x="20" y="42" font-family="ui-sans-serif, system-ui" font-size="9" fill="#5fc8c8">the Vent · lithotroph · medium</text>
</svg>
