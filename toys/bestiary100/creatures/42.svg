<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#10131c"/>
  <!-- distant luminous atmosphere glow -->
  <ellipse cx="200" cy="340" rx="220" ry="40" fill="#2a3a55" opacity="0.4"/>
  <!-- the holostrath sheet, tilted, translucent -->
  <g>
    <path d="M 60 200 Q 130 120 220 110 Q 310 100 350 170 Q 300 230 200 235 Q 100 240 60 200 Z"
          fill="#9fb4cc" opacity="0.32" stroke="#cfe0f0" stroke-width="1"/>
    <!-- diffraction-grating spicule lines (ventral) -->
    <g stroke="#6f86a8" stroke-width="0.6" opacity="0.7" fill="none">
      <path d="M 70 196 Q 140 124 222 116"/>
      <path d="M 78 192 Q 148 128 226 120"/>
      <path d="M 86 188 Q 156 132 230 124"/>
      <path d="M 94 184 Q 164 136 234 128"/>
      <path d="M 102 180 Q 172 140 238 132"/>
      <path d="M 110 178 Q 180 144 242 136"/>
      <path d="M 118 176 Q 188 148 246 140"/>
      <path d="M 126 174 Q 196 152 250 144"/>
      <path d="M 134 173 Q 204 156 254 148"/>
      <path d="M 142 172 Q 212 160 258 152"/>
      <path d="M 150 172 Q 220 164 262 156"/>
      <path d="M 158 173 Q 228 168 266 160"/>
      <path d="M 166 174 Q 236 172 270 164"/>
      <path d="M 174 176 Q 244 176 274 168"/>
      <path d="M 182 178 Q 252 180 278 172"/>
      <path d="M 190 180 Q 260 184 282 176"/>
    </g>
    <!-- prismatic streak across the sheet -->
    <path d="M 95 175 Q 180 140 270 162" fill="none" stroke="#e8a040" stroke-width="2.4" opacity="0.85"/>
    <path d="M 98 178 Q 182 144 268 165" fill="none" stroke="#c8642a" stroke-width="1.4" opacity="0.7"/>
    <path d="M 92 172 Q 178 137 272 159" fill="none" stroke="#8a9ad0" stroke-width="1.2" opacity="0.6"/>
  </g>
  <!-- a shed ribbon drifting away below -->
  <path d="M 250 270 Q 280 262 318 272 Q 300 282 268 280 Z" fill="#9fb4cc" opacity="0.28" stroke="#cfe0f0" stroke-width="0.8"/>
  <!-- label -->
  <text x="200" y="392" text-anchor="middle" font-family="monospace" font-size="11" fill="#8a98ad">Holostrath · Aether</text>
</svg>
