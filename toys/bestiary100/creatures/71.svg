<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f4ecd8"/>

  <!-- sand -->
  <path d="M0 300 Q 100 280 200 295 T 400 290 L 400 400 L 0 400 Z" fill="#e6d7a8"/>
  <path d="M0 330 Q 120 315 220 328 T 400 322 L 400 400 L 0 400 Z" fill="#d9c58a"/>

  <!-- burn trail (char line) -->
  <path d="M40 348 Q 110 340 150 350 T 300 352 Q 340 348 360 360" stroke="#2b2620" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- disc underside (peeking from sand) -->
  <ellipse cx="200" cy="295" rx="120" ry="20" fill="#3a322a"/>

  <!-- dorsal lens dome -->
  <ellipse cx="200" cy="278" rx="110" ry="26" fill="#bfe3e8"/>
  <ellipse cx="200" cy="276" rx="92" ry="18" fill="#9bcdd6"/>
  <!-- lens highlight -->
  <ellipse cx="178" cy="271" rx="34" ry="7" fill="#eaf6f7" opacity="0.85"/>

  <!-- focal beam to sand -->
  <path d="M200 298 L196 348 L208 348 Z" fill="#fff4c2" opacity="0.55"/>
  <circle cx="202" cy="348" r="3" fill="#ffffff"/>

  <!-- rim photoreceptor dots -->
  <g fill="#2b2620">
    <circle cx="92" cy="289" r="1.6"/>
    <circle cx="120" cy="293" r="1.6"/>
    <circle cx="150" cy="296" r="1.6"/>
    <circle cx="250" cy="296" r="1.6"/>
    <circle cx="280" cy="293" r="1.6"/>
    <circle cx="308" cy="289" r="1.6"/>
  </g>

  <!-- label -->
  <text x="20" y="38" font-family="Georgia, serif" font-size="15" fill="#2b2620" font-style="italic">Pyrolicus hyalinus</text>
  <text x="20" y="54" font-family="Georgia, serif" font-size="10" fill="#5a4f42">Glass Wastes · ambush disc, dorsal lens</text>
  <text x="20" y="392" font-family="Georgia, serif" font-size="9" fill="#7a6f62">Fig. 71 — noon posture, lens presenting to sun</text>
</svg>
