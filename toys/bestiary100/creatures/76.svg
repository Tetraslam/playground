<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0e1822"/>
  <!-- distant second plate, faint -->
  <g opacity="0.35" transform="translate(300,90) rotate(20) scale(0.4)">
    <polygon points="0,-70 60,-35 60,35 0,70 -60,35 -60,-35"
             fill="none" stroke="#7fb4d8" stroke-width="1.2"/>
  </g>
  <!-- main hexagonal plate, tilted -->
  <g transform="translate(180,210) rotate(-12)">
    <polygon points="0,-110 95,-55 95,55 0,110 -95,55 -95,-55"
             fill="#cfe6f2" fill-opacity="0.18"
             stroke="#a9d4e8" stroke-width="1.5"/>
    <!-- cleavage / internal fracture lines -->
    <line x1="0" y1="-110" x2="0" y2="110" stroke="#7fb4d8" stroke-width="0.6" opacity="0.7"/>
    <line x1="-95" y1="-55" x2="95" y2="55" stroke="#7fb4d8" stroke-width="0.6" opacity="0.7"/>
    <line x1="95" y1="-55" x2="-95" y2="55" stroke="#7fb4d8" stroke-width="0.6" opacity="0.7"/>
    <!-- dark UV-absorbing leading edge pigment -->
    <path d="M -95,-55 L 0,-110 L 95,-55" fill="none"
          stroke="#3a2d4a" stroke-width="4" stroke-linecap="round"/>
    <path d="M -70,-44 L 0,-82 L 70,-44" fill="none"
          stroke="#5a3d6a" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    <!-- sublimation jet, dashed vapor trail off the sunward edge -->
    <path d="M 0,-110 Q 10,-150 25,-185" fill="none"
          stroke="#e8f4fb" stroke-width="1" stroke-dasharray="2 4" opacity="0.6"/>
    <path d="M -28,-98 Q -20,-135 -8,-170" fill="none"
          stroke="#e8f4fb" stroke-width="0.8" stroke-dasharray="2 4" opacity="0.45"/>
  </g>
  <!-- a fracture beginning: hairline crack from lower-right corner -->
  <path d="M 275,265 L 250,300 L 255,330" fill="none"
        stroke="#5a3d6a" stroke-width="0.7" opacity="0.7"/>
  <!-- field-guide labels -->
  <text x="20" y="380" fill="#9bb4c4" font-family="serif" font-size="12" font-style="italic">
    Shatterkite — hexagonal ice-lattice, UV-sublimation jet
  </text>
  <text x="20" y="395" fill="#5a7080" font-family="serif" font-size="9">
    Rime · plate ~2m · dark edge = sunward
  </text>
</svg>
