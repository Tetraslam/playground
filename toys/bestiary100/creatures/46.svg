<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#1a1410"/>
  <!-- fissure walls -->
  <path d="M0,90 L120,110 L120,290 L0,310 Z" fill="#2a2018" stroke="#4a3a28" stroke-width="1"/>
  <path d="M400,90 L280,110 L280,290 L400,310 Z" fill="#2a2018" stroke="#4a3a28" stroke-width="1"/>
  <!-- plume glow -->
  <radialGradient id="plume" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0%" stop-color="#d4622a" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#d4622a" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="200" cy="200" rx="90" ry="140" fill="url(#plume)"/>
  <!-- the creature: vertical thermoelectric ribbon, edge-on -->
  <g stroke="#e8d4a8" stroke-width="0.6">
    <!-- lamellae stack -->
    <rect x="194" y="120" width="12" height="160" fill="#3a2f24"/>
    <g stroke="#7a6a4a" stroke-width="0.5">
      <line x1="194" y1="128" x2="206" y2="128"/>
      <line x1="194" y1="136" x2="206" y2="136"/>
      <line x1="194" y1="144" x2="206" y2="144"/>
      <line x1="194" y1="152" x2="206" y2="152"/>
      <line x1="194" y1="160" x2="206" y2="160"/>
      <line x1="194" y1="168" x2="206" y2="168"/>
      <line x1="194" y1="176" x2="206" y2="176"/>
      <line x1="194" y1="184" x2="206" y2="184"/>
      <line x1="194" y1="192" x2="206" y2="192"/>
      <line x1="194" y1="200" x2="206" y2="200"/>
      <line x1="194" y1="208" x2="206" y2="208"/>
      <line x1="194" y1="216" x2="206" y2="216"/>
      <line x1="194" y1="224" x2="206" y2="224"/>
      <line x1="194" y1="232" x2="206" y2="232"/>
      <line x1="194" y1="240" x2="206" y2="240"/>
      <line x1="194" y1="248" x2="206" y2="248"/>
      <line x1="194" y1="256" x2="206" y2="256"/>
      <line x1="194" y1="264" x2="206" y2="264"/>
      <line x1="194" y1="272" x2="206" y2="272"/>
    </g>
    <!-- cool-face crystalline needles (left, into cold gas) -->
    <g stroke="#9ab4c4" stroke-width="0.7">
      <line x1="194" y1="135" x2="170" y2="128"/>
      <line x1="194" y1="150" x2="166" y2="146"/>
      <line x1="194" y1="165" x2="168" y2="163"/>
      <line x1="194" y1="180" x2="165" y2="180"/>
      <line x1="194" y1="195" x2="168" y2="197"/>
      <line x1="194" y1="210" x2="166" y2="214"/>
      <line x1="194" y1="225" x2="168" y2="231"/>
      <line x1="194" y1="240" x2="166" y2="247"/>
      <line x1="194" y1="255" x2="169" y2="263"/>
      <line x1="194" y1="270" x2="170" y2="278"/>
    </g>
    <!-- hot-side dendritic wires (right, into plume) -->
    <g stroke="#c8581e" stroke-width="0.7" fill="none">
      <path d="M206,135 Q222,132 232,120 M232,120 l-3,3 M232,120 l4,1"/>
      <path d="M206,150 Q224,150 236,140 M236,140 l-3,2 M236,140 l2,-3"/>
      <path d="M206,165 Q226,168 240,160 M240,160 l-4,1 M240,160 l1,-3"/>
      <path d="M206,180 Q228,184 242,180 M242,180 l-4,1 M242,180 l2,-3"/>
      <path d="M206,195 Q226,200 240,200 M240,200 l-3,-2 M240,200 l3,1"/>
      <path d="M206,210 Q224,216 236,220 M236,220 l-2,-3 M236,220 l4,-1"/>
      <path d="M206,225 Q226,232 238,238 M238,238 l-3,-2 M238,238 l4,0"/>
      <path d="M206,240 Q224,248 234,256 M234,256 l-2,-3 M234,256 l4,-1"/>
      <path d="M206,255 Q226,263 238,270 M238,270 l-3,-2 M238,270 l4,0"/>
      <path d="M206,270 Q224,278 232,284 M232,284 l-2,-3 M232,284 l4,-1"/>
    </g>
    <!-- current arrows (faint) -->
    <g stroke="#e8d4a8" stroke-width="0.4" stroke-dasharray="2,2" opacity="0.5">
      <path d="M200,118 L200,108" marker-end="url(#a)"/>
      <path d="M200,292 L200,282" marker-end="url(#a)"/>
    </g>
  </g>
  <defs>
    <marker id="a" viewBox="0 0 6 6" refX="3" refY="3" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#e8d4a8"/>
    </marker>
  </defs>
  <!-- slag rim (waste) along base -->
  <path d="M194,280 Q200,288 206,280" stroke="#6a5848" stroke-width="1" fill="none"/>
  <!-- label -->
  <g font-family="ui-serif, Georgia, serif" fill="#c8b890" font-size="9">
    <text x="200" y="345" text-anchor="middle" font-style="italic">Thermogalvanthe lamellata</text>
    <text x="200" y="358" text-anchor="middle" font-size="7" fill="#8a7a5a">edge-on, across fissure gradient</text>
  </g>
  <g font-family="ui-serif, Georgia, serif" fill="#8a7a5a" font-size="6">
    <text x="60" y="200">cool gas</text>
    <text x="320" y="200">plume</text>
    <text x="60" y="210">~30°C</text>
    <text x="320" y="210">~400°C</text>
  </g>
</svg>
