<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#f4efe2"/>

  <!-- field-guide rule -->
  <line x1="24" y1="36" x2="376" y2="36" stroke="#2a2018" stroke-width="0.75"/>
  <line x1="24" y1="372" x2="376" y2="372" stroke="#2a2018" stroke-width="0.75"/>
  <text x="32" y="30" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#2a2018">Helisap</text>
  <text x="368" y="30" font-family="Georgia, serif" font-size="10" fill="#2a2018" text-anchor="end">Canopy &#183; parasitic</text>

  <!-- branch (cylinder, horizontal) -->
  <g stroke="#6b4a2b" fill="none">
    <line x1="40" y1="210" x2="360" y2="210" stroke-width="2"/>
    <line x1="40" y1="250" x2="360" y2="250" stroke-width="2"/>
    <ellipse cx="40" cy="230" rx="6" ry="20" stroke-width="2"/>
    <ellipse cx="360" cy="230" rx="6" ry="20" stroke-width="2"/>
  </g>
  <line x1="46" y1="210" x2="354" y2="210" stroke="#8a6240" stroke-width="0.75"/>
  <line x1="46" y1="250" x2="354" y2="250" stroke="#4a3219" stroke-width="0.75"/>

  <!-- trailing double-spiral scar (dissolved track + former live coil) -->
  <g fill="none" stroke="#3a2a1a" stroke-width="1.1">
    <path d="M 70 210 Q 90 250 110 210 Q 130 250 150 210 Q 170 250 190 210" stroke-dasharray="3 2.5"/>
    <path d="M 80 250 Q 100 210 120 250 Q 140 210 160 250 Q 180 210 200 250" stroke-dasharray="2 3" opacity="0.7"/>
  </g>

  <!-- live Helisap coil: amber, two turns in front of + behind branch -->
  <g fill="none" stroke="#d99a2b" stroke-width="3.4" stroke-linecap="round">
    <!-- back half of turn 1 -->
    <path d="M 210 250 Q 222 200 234 210" opacity="0.45"/>
    <!-- back half of turn 2 -->
    <path d="M 246 250 Q 258 200 270 210" opacity="0.45"/>
    <!-- back half of turn 3 -->
    <path d="M 282 250 Q 294 200 306 210" opacity="0.45"/>
  </g>
  <g fill="none" stroke="#e8ab32" stroke-width="4" stroke-linecap="round">
    <path d="M 210 250 Q 216 210 234 210"/>
    <path d="M 234 210 Q 246 250 270 250"/>
    <path d="M 270 250 Q 276 210 306 210"/>
    <path d="M 306 210 Q 318 250 330 250"/>
  </g>
  <g fill="none" stroke="#b87818" stroke-width="4" stroke-linecap="round">
    <!-- leading edge growth, brighter amber tap-root points -->
    <circle cx="330" cy="250" r="2.6" fill="#b87818" stroke="none"/>
    <circle cx="306" cy="210" r="2.2" fill="#b87818" stroke="none"/>
    <circle cx="270" cy="250" r="2.2" fill="#b87818" stroke="none"/>
  </g>

  <!-- direction-of-advance arrow -->
  <g stroke="#2a2018" fill="none" stroke-width="0.9">
    <line x1="345" y1="285" x2="315" y2="262"/>
    <path d="M 315 262 l 8 1 l -3 -7" stroke-linejoin="round"/>
  </g>
  <text x="348" y="292" font-family="Georgia, serif" font-size="9" fill="#2a2018" font-style="italic">advance</text>

  <!-- scar label -->
  <g stroke="#3a2a1a" fill="none" stroke-width="0.6">
    <line x1="120" y1="285" x2="120" y2="268"/>
  </g>
  <text x="120" y="297" font-family="Georgia, serif" font-size="9" fill="#3a2a1a" text-anchor="middle" font-style="italic">double-spiral scar</text>

  <!-- scale -->
  <g stroke="#2a2018" stroke-width="1">
    <line x1="280" y1="350" x2="340" y2="350"/>
    <line x1="280" y1="346" x2="280" y2="354"/>
    <line x1="340" y1="346" x2="340" y2="354"/>
  </g>
  <text x="310" y="365" font-family="Georgia, serif" font-size="9" fill="#2a2018" text-anchor="middle">~6 cm</text>
</svg>
