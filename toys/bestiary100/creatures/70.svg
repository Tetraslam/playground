<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#eaf2f5"/>
  <!-- helical scar trace in the ice behind -->
  <path d="M 40 200 Q 90 160, 140 200 T 240 200" fill="none" stroke="#9fc4d6" stroke-width="2" stroke-dasharray="3 4" opacity="0.7"/>
  <path d="M 240 200 Q 290 240, 340 200" fill="none" stroke="#9fc4d6" stroke-width="2" stroke-dasharray="3 4" opacity="0.5"/>
  <!-- the torus: outer ring -->
  <ellipse cx="240" cy="200" rx="78" ry="40" fill="none" stroke="#2f4a5a" stroke-width="3"/>
  <ellipse cx="240" cy="200" rx="78" ry="40" fill="#bcd6e4" opacity="0.35"/>
  <!-- inner lumen -->
  <ellipse cx="240" cy="200" rx="34" ry="14" fill="#eaf2f5" stroke="#2f4a5a" stroke-width="2"/>
  <!-- leading hot rim (right side) -->
  <path d="M 318 200 a 78 40 0 0 1 -8 26" fill="none" stroke="#c0563a" stroke-width="5" stroke-linecap="round"/>
  <!-- direction arrow -->
  <path d="M 330 196 L 348 200 L 330 204" fill="none" stroke="#c0563a" stroke-width="2"/>
  <!-- label -->
  <text x="20" y="370" font-family="serif" font-size="14" fill="#2f4a5a" font-style="italic">Cryostrophus gyrans</text>
  <text x="20" y="388" font-family="serif" font-size="11" fill="#5a6f7a">Rime — toroidal ice-borer, ~6 cm</text>
</svg>
