<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f4efe6"/>

  <!-- faint upper-atmosphere haze -->
  <path d="M0 70 Q100 60 200 72 T400 68" stroke="#b9c6cf" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M0 340 Q100 332 200 344 T400 340" stroke="#b9c6cf" stroke-width="1" fill="none" opacity="0.3"/>

  <g transform="translate(200,205)">
    <!-- four intersecting rings (tetrahedral gyroscope) -->
    <ellipse cx="0" cy="0" rx="118" ry="44" fill="none" stroke="#2b2f33" stroke-width="1.6" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="118" ry="44" fill="none" stroke="#2b2f33" stroke-width="1.6" opacity="0.9" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="118" ry="44" fill="none" stroke="#2b2f33" stroke-width="1.6" opacity="0.9" transform="rotate(120)"/>
    <!-- cross-ring giving depth -->
    <ellipse cx="0" cy="0" rx="44" ry="118" fill="none" stroke="#2b2f33" stroke-width="1.4" opacity="0.7"/>

    <!-- comb-rows of ice needles along ring junctions -->
    <g stroke="#6f93a8" stroke-width="1" opacity="0.85">
      <line x1="-110" y1="-2" x2="-92" y2="-14"/>
      <line x1="-80" y1="-20" x2="-62" y2="-30"/>
      <line x1="-48" y1="-36" x2="-30" y2="-42"/>
      <line x1="92" y1="-14" x2="110" y2="-2"/>
      <line x1="62" y1="-30" x2="80" y2="-20"/>
      <line x1="-110" y1="2" x2="-92" y2="14"/>
      <line x1="92" y1="14" x2="110" y2="2"/>
    </g>

    <!-- mucus filaments snaring inward flow (accent) -->
    <g stroke="#6f93a8" stroke-width="0.7" opacity="0.6" fill="none">
      <path d="M -60 -22 Q -20 -8 0 0"/>
      <path d="M 60 -22 Q 20 -8 0 0"/>
      <path d="M -60 22 Q -20 8 0 0"/>
      <path d="M 60 22 Q 20 8 0 0"/>
    </g>

    <!-- hollow core -->
    <circle r="6" fill="#e8f1f4" stroke="#2b2f33" stroke-width="0.9"/>
    <circle r="2" fill="#9fc3d6"/>
  </g>

  <!-- motion / drift arrow -->
  <path d="M 70 130 Q 120 110 175 122" stroke="#2b2f33" stroke-width="1" fill="none" opacity="0.5" marker-end="url(#a)"/>
  <defs>
    <marker id="a" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#2b2f33" opacity="0.5"/>
    </marker>
  </defs>

  <!-- scale bar -->
  <line x1="40" y1="378" x2="140" y2="378" stroke="#2b2f33" stroke-width="1.2"/>
  <text x="90" y="372" font-family="serif" font-size="10" fill="#2b2f33" text-anchor="middle">~1 m</text>

  <!-- caption -->
  <text x="200" y="30" font-family="serif" font-size="13" fill="#2b2f33" text-anchor="middle" font-style="italic">Cryogyre</text>
  <text x="200" y="45" font-family="serif" font-size="9" fill="#5a5145" text-anchor="middle">oblique aspect · Rime</text>
</svg>
