<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0c1422"/>
  <!-- distant landmass silhouette, for context -->
  <path d="M0 360 Q90 340 170 352 Q240 360 310 344 Q360 336 400 348 L400 400 L0 400 Z" fill="#16202e"/>
  <!-- faint horizon glow from below -->
  <rect x="0" y="320" width="400" height="80" fill="#1d3550" opacity="0.35"/>
  <!-- tethers: net of connected zooids -->
  <g stroke="#7fa6b8" stroke-width="0.8" opacity="0.55" fill="none">
    <line x1="120" y1="120" x2="185" y2="95"/>
    <line x1="185" y1="95"  x2="255" y2="110"/>
    <line x1="255" y1="110" x2="300" y2="160"/>
    <line x1="300" y1="160" x2="270" y2="220"/>
    <line x1="270" y1="220" x2="200" y2="240"/>
    <line x1="200" y1="240" x2="130" y2="225"/>
    <line x1="130" y1="225" x2="100" y2="170"/>
    <line x1="100" y1="170" x2="120" y2="120"/>
    <line x1="185" y1="95"  x2="200" y2="240"/>
    <line x1="120" y1="120" x2="270" y2="220"/>
    <line x1="255" y1="110" x2="130" y2="225"/>
    <line x1="100" y1="170" x2="300" y2="160"/>
  </g>
  <!-- mucus film sheet, faint -->
  <polygon points="120,120 185,95 255,110 300,160 270,220 200,240 130,225 100,170"
           fill="#6fd9e8" opacity="0.08"/>
  <!-- zooids: gas-bladdered spheres with glow halos -->
  <g>
    <circle cx="120" cy="120" r="10" fill="#6fd9e8" opacity="0.18"/>
    <circle cx="120" cy="120" r="4.5" fill="#bfeef6"/>
    <circle cx="185" cy="95"  r="11" fill="#6fd9e8" opacity="0.18"/>
    <circle cx="185" cy="95"  r="5"   fill="#bfeef6"/>
    <circle cx="255" cy="110" r="9"  fill="#6fd9e8" opacity="0.18"/>
    <circle cx="255" cy="110" r="4"   fill="#bfeef6"/>
    <circle cx="300" cy="160" r="10" fill="#6fd9e8" opacity="0.18"/>
    <circle cx="300" cy="160" r="4.5" fill="#bfeef6"/>
    <circle cx="270" cy="220" r="11" fill="#6fd9e8" opacity="0.18"/>
    <circle cx="270" cy="220" r="5"   fill="#bfeef6"/>
    <circle cx="200" cy="240" r="12" fill="#6fd9e8" opacity="0.20"/>
    <circle cx="200" cy="240" r="5.5" fill="#bfeef6"/>
    <circle cx="130" cy="225" r="9"  fill="#6fd9e8" opacity="0.18"/>
    <circle cx="130" cy="225" r="4"   fill="#bfeef6"/>
    <circle cx="100" cy="170" r="10" fill="#6fd9e8" opacity="0.18"/>
    <circle cx="100" cy="170" r="4.5" fill="#bfeef6"/>
  </g>
  <!-- trailing tethers, drifting up-left -->
  <g stroke="#7fa6b8" stroke-width="0.6" opacity="0.4">
    <line x1="120" y1="120" x2="80"  y2="80"/>
    <line x1="185" y1="95"  x2="170" y2="50"/>
    <line x1="255" y1="110" x2="290" y2="60"/>
    <line x1="100" y1="170" x2="55"  y2="195"/>
  </g>
  <!-- label -->
  <text x="20" y="385" font-family="monospace" font-size="11" fill="#6fd9e8">Lumenskein — aetheric colonial phototroph</text>
</svg>
